<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B3D — Gestión de Impresión 3D</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#070e1c;color:#c2d3e8;font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e3352;border-radius:99px}
input,select,textarea{font-family:inherit;background:#0f1e35;border:1.5px solid #1a2e4a;border-radius:10px;color:#e2eaf4;padding:10px 14px;font-size:14px;width:100%;box-sizing:border-box;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.14);background:#112040}
input::placeholder{color:#2e4a6a}select{cursor:pointer;appearance:none}textarea{resize:vertical;min-height:72px}
button{cursor:pointer;font-family:inherit;transition:all .2s ease}button:active{transform:scale(.97)!important}
label{display:block;font-size:11px;color:#3d5a7a;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.9px}
table{width:100%;border-collapse:collapse}
th{color:#2e4a6a;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:11px 16px;text-align:left;border-bottom:1px solid #0f1e35;white-space:nowrap;background:#070e1c;position:sticky;top:0;z-index:1}
td{padding:14px 16px;color:#7a9ab8;font-size:13px;border-bottom:1px solid #0a1525;vertical-align:middle;transition:background .15s}
tr:hover td{background:rgba(59,130,246,.05)}tbody tr:last-child td{border-bottom:none}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(37,99,235,.35);display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{box-shadow:0 6px 20px rgba(37,99,235,.5);transform:translateY(-1px)}
.btn-secondary{background:#0f1e35;color:#6a8faa;border:1.5px solid #1a2e4a;border-radius:10px;padding:9px 16px;font-weight:600;font-size:13px}
.btn-secondary:hover{background:#132540;border-color:#2a4470;color:#93b4cc;transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-weight:700;font-size:14px;box-shadow:0 4px 12px rgba(239,68,68,.25)}
.btn-danger:hover{box-shadow:0 6px 18px rgba(239,68,68,.4);transform:translateY(-1px)}
.btn-icon{background:none;border:none;font-size:16px;opacity:.5;padding:6px 7px;border-radius:8px;transition:all .15s;line-height:1}
.btn-icon:hover{opacity:1;background:rgba(255,255,255,.06);transform:none!important}
.fact-btn{color:#4ade80!important;opacity:1!important}.fact-btn:hover{background:rgba(34,197,94,.1)!important}
.card{background:linear-gradient(145deg,#0d1e36,#0a1828);border:1px solid #132540;border-radius:16px;padding:24px;box-shadow:0 4px 24px rgba(0,0,0,.35)}
.card-title{font-size:10px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:18px}
.field{margin-bottom:17px}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;gap:16px}
.page-title{font-size:26px;font-weight:900;color:#e8f0fa;letter-spacing:-.8px;line-height:1}
.page-subtitle{font-size:13px;color:#3d5a7a;margin-top:4px;font-weight:500}
.flexwrap{display:flex;flex-wrap:wrap;gap:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);padding:16px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(145deg,#0d1e36,#0a1828);border:1px solid #132540;border-radius:18px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.75);animation:slideUp .22s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
.modal-wide{max-width:760px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:22px 26px 0}
.modal-title{font-size:19px;font-weight:800;color:#e8f0fa;letter-spacing:-.4px}.modal-body{padding:24px 26px}
.close-btn{background:#0f1e35;border:1.5px solid #1a2e4a;color:#3d5a7a;font-size:15px;line-height:1;padding:5px 10px;border-radius:8px;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:3px 12px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.4px;white-space:nowrap}
.nav-btn{display:flex;align-items:center;gap:12px;width:100%;padding:11px 18px;background:none;border:none;border-right:3px solid transparent;color:#3d5a7a;text-align:left;font-size:13.5px;transition:all .18s;white-space:nowrap}
.nav-btn:hover{background:rgba(59,130,246,.07);color:#7aabcc;transform:none;opacity:1}
.nav-btn.active{background:linear-gradient(90deg,rgba(37,99,235,.18),rgba(37,99,235,.06));border-right-color:#3b82f6;color:#93c5fd;font-weight:600}
.chip{padding:6px 15px;border-radius:99px;border:1.5px solid #132540;background:none;color:#3d5a7a;font-size:12px;font-weight:600;transition:all .18s}
.chip:hover{border-color:#1e3a5f;color:#6a8faa;transform:none}
.chip.active{background:linear-gradient(135deg,rgba(37,99,235,.2),rgba(29,78,216,.12));color:#93c5fd;border-color:#2563eb}
.warn-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#f87171;display:flex;align-items:center;gap:8px}
.cost-box{background:#070e1c;border:1px solid #0f1e35;border-radius:13px;padding:16px;margin-top:10px}
.cost-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.cost-item{background:linear-gradient(145deg,#0d1e36,#0a1828);border:1px solid #132540;border-radius:10px;padding:11px 13px}
.cost-lbl{font-size:10px;color:#2e4a6a;text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px;font-weight:700}
.cost-val{font-weight:800;font-family:'Courier New',monospace;font-size:16px}
.dropzone{border:2px dashed #132540;border-radius:14px;padding:48px 20px;text-align:center;cursor:pointer;background:#070e1c;transition:all .22s;margin-bottom:22px}
.dropzone:hover,.dropzone.over{border-color:#3b82f6;background:rgba(37,99,235,.07)}
.file-thumb{height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;background:#070e1c;border-radius:10px;overflow:hidden}
.file-thumb img{max-height:94px;max-width:100%;object-fit:cover}
.progress-track{height:7px;background:#0f1e35;border-radius:99px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;border-radius:99px;transition:width .5s ease}
.num-badge{display:inline-block;background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:800;font-family:'Courier New',monospace;letter-spacing:.5px}
.stat-card{flex:1;min-width:155px}
.bar-chart{display:flex;gap:8px;align-items:flex-end;height:110px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:linear-gradient(180deg,#3b82f6,#1d4ed8);border-radius:6px 6px 0 0;transition:height .5s cubic-bezier(.34,1.2,.64,1);min-height:4px}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{background:linear-gradient(180deg,#070e1c,#060b17);border-right:1px solid #0d1c30;display:flex;flex-direction:column;width:224px;flex-shrink:0;overflow:hidden;transition:width .22s ease}
#sidebar.collapsed{width:66px}
#sb-logo{display:flex;align-items:center;gap:12px;padding:20px 18px 18px;cursor:pointer;border-bottom:1px solid #0d1c30;margin-bottom:10px;user-select:none}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:rgba(7,14,28,.95);backdrop-filter:blur(12px);border-bottom:1px solid #0d1c30;padding:12px 28px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;min-height:56px;z-index:10}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 32px;min-height:0}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 0 0 2px rgba(59,130,246,.3)}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 35%,#0d1e36 0%,#070e1c 65%)}
.auth-card{background:linear-gradient(145deg,#0d1e36,#0a1828);border:1px solid #132540;border-radius:20px;padding:44px 40px;width:100%;max-width:390px;box-shadow:0 40px 100px rgba(0,0,0,.65)}
.tabs{display:flex;background:#070e1c;border-radius:11px;padding:4px;margin-bottom:24px;gap:3px}
.tab{flex:1;padding:9px 0;background:transparent;border:none;color:#3d5a7a;border-radius:8px;font-size:14px;font-weight:500}
.tab.active{background:linear-gradient(145deg,#0d1e36,#0a1828);color:#e2eaf4;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.err-msg{color:#f87171;font-size:13px;margin-bottom:12px;background:rgba(239,68,68,.1);padding:10px 14px;border-radius:9px;border:1px solid rgba(239,68,68,.22)}
.hidden{display:none!important}
.loading-spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#0d1e36;border:1px solid #132540;border-radius:12px;padding:12px 18px;font-size:13px;color:#e2eaf4;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;animation:slideUp .25s ease;max-width:320px}
.toast.ok{border-color:rgba(34,197,94,.4);color:#4ade80}
.toast.err{border-color:rgba(239,68,68,.4);color:#f87171}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none"><rect width="38" height="38" rx="9" fill="#1d4ed8"/><polygon points="19,7 30,13 30,25 19,31 8,25 8,13" fill="none" stroke="#93c5fd" stroke-width="1.5"/><polygon points="19,7 30,13 19,19 8,13" fill="#3b82f6" opacity="0.8"/><polygon points="8,13 19,19 19,31 8,25" fill="#2563eb"/><polygon points="30,13 19,19 19,31 30,25" fill="#1d4ed8"/></svg>
      <div><div style="font-size:24px;font-weight:900;color:#f1f5f9;letter-spacing:-1.5px">B3D</div><div style="font-size:10px;color:#3b82f6;font-weight:600;letter-spacing:2px;text-transform:uppercase">Print Studio</div></div>
    </div>
    <p style="color:#3d5a7a;font-size:13px;margin-bottom:28px">Gestión profesional de impresión 3D</p>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Registrarse</button>
    </div>
    <div id="name-field" class="field hidden"><label>Nombre</label><input id="a-name" type="text" placeholder="Tu nombre"></div>
    <div class="field"><label>Email</label><input id="a-email" type="email" placeholder="tu@email.com"></div>
    <div class="field"><label>Contraseña</label><input id="a-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"></div>
    <div id="a-err" class="err-msg hidden"></div>
    <button class="btn-primary" style="width:100%;margin-top:4px;justify-content:center" id="auth-btn" onclick="doAuth()">Entrar</button>
    <div id="reset-wrap" style="text-align:center;margin-top:14px">
      <button onclick="doReset()" style="background:none;border:none;color:#3d5a7a;font-size:12px;cursor:pointer;text-decoration:underline">¿Olvidaste tu contraseña?</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div id="sidebar">
    <div id="sb-logo" onclick="toggleSb()">
      <svg width="30" height="30" viewBox="0 0 38 38" fill="none" style="flex-shrink:0"><rect width="38" height="38" rx="9" fill="#1d4ed8"/><polygon points="19,7 30,13 30,25 19,31 8,25 8,13" fill="none" stroke="#93c5fd" stroke-width="1.5"/><polygon points="19,7 30,13 19,19 8,13" fill="#3b82f6" opacity="0.8"/><polygon points="8,13 19,19 19,31 8,25" fill="#2563eb"/><polygon points="30,13 19,19 19,31 30,25" fill="#1d4ed8"/></svg>
      <div id="brand-lbl" style="white-space:nowrap"><div style="font-size:16px;font-weight:900;color:#f1f5f9;letter-spacing:-1px;line-height:1.1">B3D</div><div style="font-size:9px;color:#3b82f6;font-weight:600;letter-spacing:1.5px;text-transform:uppercase">Print Studio</div></div>
    </div>
    <nav id="sb-nav" style="flex:1;overflow-y:auto;overflow-x:hidden"></nav>
    <div style="border-top:1px solid #0d1c30;padding:8px 0">
      <button class="nav-btn" onclick="logout()" style="color:#ef4444"><span style="font-size:18px;flex-shrink:0">🚪</span><span id="logout-lbl">Cerrar sesión</span></button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:16px;flex:1;min-width:0">
        <div id="tb-company" style="font-size:16px;font-weight:700;color:#60a5fa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar" id="user-av"></div>
        <span id="user-lbl" style="color:#7a9ab8;font-size:14px"></span>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════
//  SUPABASE INIT
// ═══════════════════════════════════════════════
const SUPA_URL = 'https://uzgzfxizpoigzcnlunpr.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Z3pmeGl6cG9pZ3pjbmx1bnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzAwMzIsImV4cCI6MjA4OTUwNjAzMn0.BORxgB6W2malo09zQALxN4rkgDEu67MmTnUqZhyTIjE';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let CU    = null;   // current user (supabase user object)
let PAGE  = 'dashboard';
let SB_OPEN = true;

// In-memory cache (reloaded on every page navigation)
let _cache = { clientes:[], pedidos:[], impresoras:[], filamentos:[], piezas:[], archivos:[], cfg:{} };

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
const uid  = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Date.now().toString(36);
const today= () => new Date().toISOString().split('T')[0];
const esc  = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $    = id => document.getElementById(id);

function showToast(msg, type='ok', dur=3000){
  const el=document.createElement('div');
  el.className='toast '+type; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), dur);
}

function setLoading(btnId, loading, label=''){
  const b=$(btnId); if(!b) return;
  b.disabled=loading;
  b.innerHTML = loading ? '<span class="loading-spinner"></span>Cargando…' : label;
}

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
let authMode = 'login';

function switchTab(m){
  authMode=m;
  $('tab-login').className='tab'+(m==='login'?' active':'');
  $('tab-signup').className='tab'+(m==='signup'?' active':'');
  $('name-field').className='field'+(m==='signup'?'':' hidden');
  $('auth-btn').textContent = m==='login'?'Entrar':'Crear cuenta';
  $('a-err').className='err-msg hidden';
}

async function doAuth(){
  const email=$('a-email').value.trim();
  const pass =$('a-pass').value;
  const name =$('a-name').value.trim();
  $('a-err').className='err-msg hidden';
  setLoading('auth-btn',true);

  let err=null;
  if(authMode==='login'){
    const r=await sb.auth.signInWithPassword({email,password:pass});
    err=r.error;
  } else {
    if(!name||!email||!pass){ showAuthErr('Rellena todos los campos'); setLoading('auth-btn',false); return; }
    const r=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
    err=r.error;
    if(!err) showToast('¡Cuenta creada! Revisa tu email para confirmar.','ok',5000);
  }

  setLoading('auth-btn',false);
  if(err) showAuthErr(err.message);
}

async function doReset(){
  const email=$('a-email').value.trim();
  if(!email){ showAuthErr('Escribe tu email primero'); return; }
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error) showAuthErr(error.message);
  else showToast('Email de recuperación enviado','ok',4000);
}

function showAuthErr(msg){ const e=$('a-err'); e.textContent=msg; e.className='err-msg'; }

// Listen to auth state
sb.auth.onAuthStateChange(async (event, session)=>{
  if(session?.user){
    CU=session.user;
    await bootApp();
  } else {
    CU=null;
    $('app').className='hidden';
    $('auth-screen').className='';
  }
});

async function logout(){
  await sb.auth.signOut();
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
async function bootApp(){
  $('auth-screen').className='hidden';
  $('app').className='';
  const name = CU.user_metadata?.name || CU.email?.split('@')[0] || 'Usuario';
  $('user-av').textContent = name.charAt(0).toUpperCase();
  $('user-lbl').textContent = name;
  buildNav();
  await loadAll();
  goTo('dashboard');
}

// ═══════════════════════════════════════════════
//  DATA LAYER — Supabase CRUD
// ═══════════════════════════════════════════════
async function loadAll(){
  const uid=CU.id;
  const [c,p,im,fi,pz,ar,cfg]=await Promise.all([
    sb.from('clientes').select('*').eq('user_id',uid).order('created_at'),
    sb.from('pedidos').select('*').eq('user_id',uid).order('created_at'),
    sb.from('impresoras').select('*').eq('user_id',uid).order('created_at'),
    sb.from('filamentos').select('*').eq('user_id',uid).order('created_at'),
    sb.from('piezas').select('*').eq('user_id',uid).order('created_at'),
    sb.from('archivos').select('*').eq('user_id',uid).order('created_at'),
    sb.from('config').select('*').eq('user_id',uid).single(),
  ]);
  _cache.clientes   = c.data||[];
  _cache.pedidos    = mapPedidos(p.data||[]);
  _cache.impresoras = mapImpresoras(im.data||[]);
  _cache.filamentos = mapFilamentos(fi.data||[]);
  _cache.piezas     = mapPiezas(pz.data||[]);
  _cache.archivos   = ar.data||[];
  _cache.cfg        = cfg.data ? mapCfg(cfg.data) : {costePorGramo:0.03,costePorHora:0.15,margen:30,moneda:'€',empresa:'',telefono:'',email:''};
  refreshBizHeader();
}

// Map DB column names → app property names
function mapPedidos(rows){ return rows.map(r=>({
  id:r.id, clienteId:r.cliente_id, proyecto:r.proyecto, material:r.material,
  peso:r.peso, tiempoImpresion:r.tiempo_impresion, estado:r.estado, notas:r.notas,
  fecha:r.fecha, gananciaManual:r.ganancia_manual, costePostprocesado:r.coste_postprocesado,
  presNum:r.pres_num, facturaNum:r.factura_num, facturaFecha:r.factura_fecha,
  lineas:r.lineas||[]
}));}

function mapImpresoras(rows){ return rows.map(r=>({
  id:r.id,nombre:r.nombre,modelo:r.modelo,estado:r.estado,
  horasUso:r.horas_uso,desgaste:r.desgaste
}));}

function mapFilamentos(rows){ return rows.map(r=>({
  id:r.id,tipo:r.tipo,marca:r.marca,color:r.color,
  pesoRestante:r.peso_restante,precioPorKg:r.precio_por_kg
}));}

function mapPiezas(rows){ return rows.map(r=>({
  id:r.id,nombre:r.nombre,material:r.material,
  peso:r.peso,tiempoImpresion:r.tiempo_impresion,precioSugerido:r.precio_sugerido
}));}

function mapCfg(r){ return {

async function dbSave(table, data){
  const payload = {...data, user_id: CU.id};
  let error;
  // Check if record exists (has id that's already saved)
  const existing = _cache[table]?.find?.(x=>x.id===data.id);
  if(data.id && existing){
    const res = await sb.from(table).update(payload).eq('id', data.id).eq('user_id', CU.id);
    error = res.error;
  } else {
    const res = await sb.from(table).insert(payload);
    error = res.error;
  }
  if(error){ showToast('Error: '+error.message,'err'); console.error(table, error); }
  return !error;
}

async function dbDel(table, id){
  const {error}=await sb.from(table).delete().eq('id',id).eq('user_id',CU.id);
  if(error) showToast('Error al eliminar: '+error.message,'err');
  return !error;
}

//  COSTS
// ═══════════════════════════════════════════════
function calcOrderCosts(order,cfg){
  const filaments=_cache.filamentos;
  let mc=0;
  if(order.lineas&&order.lineas.length>0){
    for(const l of order.lineas){
      const qty=parseInt(l.qty)||1;
      const peso=(parseFloat(l.peso)||0)*qty;
      let costG=parseFloat(cfg.costePorGramo)||0.03;
      if(l.filamentoId&&l.filamentoId!=='__manual__'){
        const fil=filaments.find(f=>f.id===l.filamentoId);
        if(fil) costG=(parseFloat(fil.precioPorKg)||0)/1000;
      }
      mc+=peso*costG;
    }
  } else {
    mc=(parseFloat(order.peso)||0)*(parseFloat(cfg.costePorGramo)||0.03);
  }
  const ec=(parseFloat(order.tiempoImpresion)||0)*(parseFloat(cfg.costePorHora)||0.15);
  const pp=parseFloat(order.costePostprocesado||0);
  const tc=mc+ec+pp;
  const fp=order.gananciaManual?tc+parseFloat(order.gananciaManual):tc*(1+(parseFloat(cfg.margen)||30)/100);
  return{mc,ec,pp,tc,fp,profit:fp-tc};
}

function downloadPDFFile(id){
  const html=buildPDFHtml(id);if(!html)return null;
  const o=_cache.pedidos.find(x=>x.id===id);if(!o)return null;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`Presupuesto_${o.proyecto.replace(/\s+/g,'_')}.html`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  return o;
}

  }
  const cl=_cache.clientes.find(x=>x.id===o.clienteId)||{};
  const cfg=_cache.cfg; const biz=cfg;
  const c=calcOrderCosts(o,cfg); const mon=cfg.moneda||'€';

function pgDashboard(){
  const orders=_cache.pedidos; const cfg=_cache.cfg;
  const paid=orders.filter(o=>o.estado==='pagado');
  const totI=paid.reduce((s,o)=>s+calcOrderCosts(o,cfg).fp,0);
  const totC=paid.reduce((s,o)=>s+calcOrderCosts(o,cfg).tc,0);
  const ben=totI-totC;
  const months={};
  orders.forEach(o=>{const m=(o.fecha||'').slice(0,7);if(!m)return;if(!months[m])months[m]={i:0};if(o.estado==='pagado')months[m].i+=calcOrderCosts(o,cfg).fp;});
  const mks=Object.keys(months).sort().slice(-7);
  const maxI=Math.max(...mks.map(m=>months[m].i),1);
  const byE={};orders.forEach(o=>{byE[o.estado]=(byE[o.estado]||0)+1;});
  const pendCount=orders.filter(o=>o.estado==='pendiente').length;
  const impCount=orders.filter(o=>o.estado==='imprimiendo').length;
  const recent=[...orders].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,6);

  const bars=mks.length===0?'<p style="color:#2e4a6a;font-size:13px">Sin pedidos pagados aún</p>':`<div class="bar-chart">${mks.map(m=>`<div class="bar-col"><div style="font-size:10px;color:#2e4a6a;font-family:monospace">${months[m].i>0?months[m].i.toFixed(0):''}</div><div class="bar" style="height:${Math.max(4,(months[m].i/maxI)*88)}px"></div></div>`).join('')}</div><div style="display:flex;gap:8px;margin-top:8px">${mks.map(m=>`<div style="flex:1;text-align:center;font-size:9px;color:#2e4a6a">${m.slice(5)}/${m.slice(2,4)}</div>`).join('')}</div>`;

  const eList=Object.entries(byE).length===0?'<p style="color:#2e4a6a;font-size:13px">Sin pedidos</p>':Object.entries(byE).map(([k,v])=>`<button onclick="goToEstado('${k}')" style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,.02);border:1px solid #132540;border-radius:10px;cursor:pointer;transition:all .18s;text-align:left" onmouseover="this.style.background='rgba(59,130,246,.08)';this.style.borderColor='#2563eb40'" onmouseout="this.style.background='rgba(255,255,255,.02)';this.style.borderColor='#132540'">${mkBadge(k)}<span style="color:#93c5fd;font-weight:800;font-size:18px;font-family:monospace">${v}</span></button>`).join('');

  const recent6=recent.map(o=>{const c=calcOrderCosts(o,cfg);return`<tr><td><span class="num-badge">${esc(o.presNum||'—')}</span></td><td><span style="color:#e2e8f0;font-weight:700">${esc(o.proyecto)}</span></td><td style="color:#7a9ab8">${esc(o.material)}</td><td style="color:#34d399;font-weight:800">${c.fp.toFixed(2)}${cfg.moneda||'€'}</td><td>${mkBadge(o.estado)}</td><td style="color:#2e4a6a">${esc(o.fecha)}</td></tr>`;}).join('');

  return`<div style="margin-bottom:28px"><h2 class="page-title">Dashboard</h2><div class="page-subtitle">Resumen de tu negocio</div></div>
<div class="flexwrap" style="margin-bottom:22px">
  ${stC('Ingresos cobrados',totI.toFixed(2)+(cfg.moneda||'€'),'💰','#34d399',`${paid.length} pedido${paid.length!==1?'s':''} pagados`)}
  ${stC('Costes producción',totC.toFixed(2)+(cfg.moneda||'€'),'📦','#fbbf24','')}
  ${stC('Beneficio neto',ben.toFixed(2)+(cfg.moneda||'€'),'📈',ben>=0?'#34d399':'#f87171',ben>=0?'Margen positivo ✓':'Revisar precios')}
  ${stC('Total pedidos',orders.length,'🖨️','#93c5fd',`${pendCount} pendiente${pendCount!==1?'s':''} · ${impCount} imprimiendo`)}
</div>
<div class="flexwrap">
  <div class="card" style="flex:2;min-width:260px"><div class="card-title">Ingresos por mes</div>${bars}</div>
  <div class="card" style="flex:1;min-width:200px"><div class="card-title" style="margin-bottom:12px">Por estado <span style="font-size:9px;color:#2e4a6a;font-weight:600;text-transform:none;letter-spacing:0;margin-left:4px">— toca para filtrar</span></div>${eList}</div>
</div>
<div class="card" style="margin-top:18px;padding:0;overflow:hidden">
  <div style="padding:18px 22px;border-bottom:1px solid #0f1e35;display:flex;align-items:center;gap:10px"><span>🕐</span><span class="card-title" style="margin:0">Últimos pedidos</span></div>
  <div style="overflow-x:auto"><table><thead><tr><th>Nº</th><th>Proyecto</th><th>Material</th><th>Precio</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>${recent6.length?recent6:'<tr><td colspan="6" style="text-align:center;color:#2e4a6a;padding:32px">Sin pedidos aún</td></tr>'}</tbody></table></div>
</div>`;
}

function clienteFrm(x={}){ return fld('Nombre *','nombre',x.nombre||'')+fld('Empresa','empresa',x.empresa||'')+fld('Teléfono','telefono',x.telefono||'')+fld('Email','email',x.email||'','email')+fld('Notas','notas',x.notas||'','textarea'); }
function editC(id){
  const x=id?_cache.clientes.find(c=>c.id===id)||{}:{};
  openModal(msh(id?'Editar cliente':'Nuevo cliente',`${clienteFrm(x)}<div style="display:flex;gap:10px;margin-top:8px"><button class="btn-primary" id="save-c-btn" onclick="saveC('${id||''}')">Guardar</button><button class="btn-secondary" onclick="closeModal()">Cancelar</button></div>`));
}
async function saveC(id){
  const d=gfd(['nombre','empresa','telefono','email','notas']);
  if(!d.nombre.trim()){alert('Nombre obligatorio');return;}
  setLoading('save-c-btn',true);
  const row={nombre:d.nombre,empresa:d.empresa,telefono:d.telefono,email:d.email,notas:d.notas};
  if(id){row.id=id;}else{row.id=uid();}
  const ok=await dbSave('clientes',row);
  if(ok){
    if(id)_cache.clientes=_cache.clientes.map(i=>i.id===id?{...i,...row}:i);

function delC(id){ confirmDel('¿Eliminar este cliente?',`doDelC('${id}')`); }

async function saveP(id){

const MATS=['PLA','PETG','ABS','ASA','TPU','Nylon','Resina','PLA+','Otro'];
function pgFilamentos(){
  const items=_cache.filamentos;
  const rows=items.length===0?'<tr><td colspan="8" style="text-align:center;color:#2e4a6a;padding:28px">Sin filamentos</td></tr>':items.map(f=>{
    const pct=Math.min((parseFloat(f.pesoRestante)/1000)*100,100);const low=parseFloat(f.pesoRestante)<100;
    return`<tr><td><span style="font-weight:700;color:#e2eaf4">${esc(f.tipo)}</span></td><td>${esc(f.marca)}</td>
<td><span style="display:inline-flex;align-items:center;gap:6px"><span style="width:14px;height:14px;border-radius:50%;background:${esc(f.color)};border:1px solid #334155;display:inline-block"></span>${esc(f.color)}</span></td>
<td style="color:${low?'#ef4444':'#94a3b8'}">${esc(f.pesoRestante)}g ${low?'⚠️':''}</td>
<td>${esc(f.precioPorKg)}€</td><td>${(f.precioPorKg/1000).toFixed(4)}€</td>
<td><div style="display:flex;align-items:center;gap:8px"><div style="width:70px;height:6px;background:#0f1e35;border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${low?'#ef4444':'#3b82f6'};border-radius:99px"></div></div><span style="font-size:11px;color:#2e4a6a">${pct.toFixed(0)}%</span></div></td>
<td style="text-align:right"><button class="btn-icon" onclick="editF('${f.id}')">✏️</button><button class="btn-icon" onclick="delF('${f.id}')">🗑️</button></td></tr>`;}).join('');
  return`<div class="page-header"><h2 class="page-title">Filamentos</h2><button class="btn-primary" onclick="editF(null)">+ Nuevo filamento</button></div>
<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Tipo</th><th>Marca</th><th>Color</th><th>Restante</th><th>€/kg</th><th>€/g</th><th>Stock</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function filamentoFrm(x={}){ return fld('Tipo','tipo',x.tipo||'PLA','text',MATS)+fld('Marca *','marca',x.marca||'')+fld('Color','color',x.color||'#1d4ed8','color')+fld('Peso restante (g)','pesoRestante',x.pesoRestante??1000,'number')+fld('Precio por kg (€)','precioPorKg',x.precioPorKg||20,'number'); }
function editF(id){
  const x=id?_cache.filamentos.find(f=>f.id===id)||{}:{};
  openModal(msh(id?'Editar filamento':'Nuevo filamento',`${filamentoFrm(x)}<div style="display:flex;gap:10px;margin-top:8px"><button class="btn-primary" id="save-f-btn" onclick="saveF('${id||''}')">Guardar</button><button class="btn-secondary" onclick="closeModal()">Cancelar</button></div>`));
}
async function saveF(id){
  const d=gfd(['tipo','marca','color','pesoRestante','precioPorKg']);
  if(!d.marca.trim()){alert('Marca obligatoria');return;}
  setLoading('save-f-btn',true);
  const row={tipo:d.tipo,marca:d.marca,color:d.color,peso_restante:d.pesoRestante,precio_por_kg:d.precioPorKg};
  if(id)row.id=id;else row.id=uid();
  const ok=await dbSave('filamentos',row);
  const mapped={id:row.id,tipo:d.tipo,marca:d.marca,color:d.color,pesoRestante:d.pesoRestante,precioPorKg:d.precioPorKg};
  if(ok){if(id)_cache.filamentos=_cache.filamentos.map(i=>i.id===id?mapped:i);else _cache.filamentos.push(mapped);closeModal();render();showToast('Guardado','ok');}
}
function delF(id){ confirmDel('¿Eliminar este filamento?',`doDelF('${id}')`); }
async function doDelF(id){ if(await dbDel('filamentos',id)){_cache.filamentos=_cache.filamentos.filter(x=>x.id!==id);render();showToast('Eliminado','ok');} }

function pgPiezas(){
  const items=_cache.piezas;
  const cards=items.length===0?'<p style="color:#3d5a7a">Sin piezas guardadas</p>':items.map(p=>`
<div class="card" style="min-width:200px;flex:1 1 200px"><div style="font-size:32px;margin-bottom:10px">🧩</div>
<div style="font-weight:700;color:#e2eaf4;margin-bottom:6px">${esc(p.nombre)}</div>
<div style="font-size:13px;color:#3d5a7a;display:flex;flex-direction:column;gap:3px;margin-bottom:14px">
<span>Material: <b style="color:#7a9ab8">${esc(p.material)}</b></span><span>Peso: <b style="color:#7a9ab8">${esc(p.peso)}g</b></span>
<span>Tiempo: <b style="color:#7a9ab8">${esc(p.tiempoImpresion)}h</b></span><span>Sugerido: <b style="color:#22c55e">${esc(p.precioSugerido)}€</b></span></div>

<div class="flexwrap">${cards}</div>`;

function piezaFrm(x={}){ return fld('Nombre *','nombre',x.nombre||'')+fld('Material','material',x.material||'PLA','text',MATS)+fld('Peso (g)','peso',x.peso||'','number')+fld('Tiempo impresión (h)','tiempoImpresion',x.tiempoImpresion||'','number')+fld('Precio sugerido (€)','precioSugerido',x.precioSugerido||'','number'); }
function editPz(id){
  const x=id?_cache.piezas.find(p=>p.id===id)||{}:{};
  openModal(msh(id?'Editar pieza':'Nueva pieza',`${piezaFrm(x)}<div style="display:flex;gap:10px;margin-top:8px"><button class="btn-primary" id="save-pz-btn" onclick="savePz('${id||''}')">Guardar</button><button class="btn-secondary" onclick="closeModal()">Cancelar</button></div>`));
}
async function savePz(id){
  const d=gfd(['nombre','material','peso','tiempoImpresion','precioSugerido']);
  if(!d.nombre.trim()){alert('Nombre obligatorio');return;}
  setLoading('save-pz-btn',true);
  const row={nombre:d.nombre,material:d.material,peso:d.peso,tiempo_impresion:d.tiempoImpresion,precio_sugerido:d.precioSugerido};
  if(id)row.id=id;else row.id=uid();
  const ok=await dbSave('piezas',row);
  const mapped={id:row.id,nombre:d.nombre,material:d.material,peso:d.peso,tiempoImpresion:d.tiempoImpresion,precioSugerido:d.precioSugerido};
  if(ok){if(id)_cache.piezas=_cache.piezas.map(i=>i.id===id?mapped:i);else _cache.piezas.push(mapped);closeModal();render();showToast('Guardado','ok');}
}
function delPz(id){ confirmDel('¿Eliminar esta pieza?',`doDelPz('${id}')`); }
async function doDelPz(id){ if(await dbDel('piezas',id)){_cache.piezas=_cache.piezas.filter(x=>x.id!==id);render();showToast('Eliminado','ok');} }

let _pFilt='todos',_pSearch='';
function pgPedidos(){
  const orders=_cache.pedidos; const clients=_cache.clientes; const cfg=_cache.cfg;
  const ESTADOS=['todos','pendiente','imprimiendo','terminado','entregado','pagado'];
  const rowHl={pendiente:'rgba(245,158,11,.06)',imprimiendo:'rgba(59,130,246,.06)',pagado:'rgba(34,197,94,.06)',terminado:'rgba(16,185,129,.04)',entregado:'rgba(139,92,246,.05)'};
  const chips=ESTADOS.map(e=>`<button class="chip${_pFilt===e?' active':''}" onclick="_pFilt='${e}';render()">${e}</button>`).join('');
  const fl=orders.filter(o=>{
    if(_pFilt!=='todos'&&o.estado!==_pFilt)return false;
    if(_pSearch&&!o.proyecto?.toLowerCase().includes(_pSearch.toLowerCase()))return false;
    return true;
  });
  const rows=fl.length===0?'<tr><td colspan="9" style="text-align:center;color:#2e4a6a;padding:32px">Sin pedidos — crea tu primer pedido 👆</td></tr>':fl.map(o=>{
    const cl=clients.find(x=>x.id===o.clienteId)||{};
    const c=calcOrderCosts(o,cfg);
    const bg=rowHl[o.estado]||'';
    const isPagado=o.estado==='pagado';
    const hasFactura=!!o.facturaNum;
    const piezasCount=(o.lineas||[]).reduce((s,l)=>s+(parseInt(l.qty)||1),0)||'—';
    let factBtn;
    if(isPagado){factBtn='<button class="btn-icon fact-btn" title="'+(hasFactura?'Ver factura':'Generar factura')+'" onclick="genFactura(\''+o.id+'\')" style="font-size:18px">🧾</button>';}
    else{factBtn='<button class="btn-icon" title="Solo para pedidos pagados" style="opacity:.18;cursor:not-allowed;font-size:18px">🧾</button>';}
    const factBadge=hasFactura?'<div style="margin-top:3px"><span style="display:inline-block;background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3);border-radius:5px;padding:1px 7px;font-size:9px;font-weight:800;font-family:monospace">🧾 '+esc(o.facturaNum)+'</span></div>':'';
    const multiPieza=(o.lineas&&o.lineas.length>1)?'<div style="font-size:10px;color:#3d5a7a;margin-top:2px">'+o.lineas.length+' tipos · '+piezasCount+' uds</div>':'';
    return'<tr style="'+(bg?'background:'+bg:'')+'"><td><span class="num-badge">'+esc(o.presNum||'—')+'</span>'+factBadge+'</td>'
      +'<td><span style="color:#e2e8f0;font-weight:700;font-size:13.5px">'+esc(o.proyecto)+'</span>'+multiPieza+'</td>'
      +'<td style="color:#7a9ab8">'+esc(cl.nombre||'—')+'</td>'
      +'<td><span style="background:#0f1e35;color:#7a9ab8;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600">'+esc(o.material)+'</span></td>'
      +'<td style="color:#7a9ab8">'+esc(o.peso)+'g</td>'
      +'<td style="color:#34d399;font-weight:800;font-size:14px">'+c.fp.toFixed(2)+(cfg.moneda||'€')+'</td>'
      +'<td>'+mkBadge(o.estado)+'</td>'
      +'<td style="color:#2e4a6a">'+esc(o.fecha)+'</td>'
      +'<td style="text-align:right;white-space:nowrap">'
        +'<button class="btn-icon" title="Presupuesto PDF" onclick="genPDF(\''+o.id+'\')">📄</button>'
        +'<button class="btn-icon" title="WhatsApp" onclick="sendWA(\''+o.id+'\')">💬</button>'
        +factBtn
        +'<button class="btn-icon" onclick="editO(\''+o.id+'\')">✏️</button>'
        +'<button class="btn-icon" onclick="delO(\''+o.id+'\')">🗑️</button>'
      +'</td></tr>';
  }).join('');

  return`<div class="page-header"><div><h2 class="page-title">Pedidos</h2><div class="page-subtitle">${orders.length} pedido${orders.length!==1?'s':''} en total</div></div><button class="btn-primary" onclick="editO(null)">+ Nuevo pedido</button></div>
<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">${chips}<input style="flex:1;min-width:160px" placeholder="🔍 Buscar proyecto…" value="${esc(_pSearch)}" oninput="_pSearch=this.value;render()"></div>
<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Nº / Factura</th><th>Proyecto</th><th>Cliente</th><th>Material</th><th>Peso</th><th>Precio</th><th>Estado</th><th>Fecha</th><th style="min-width:140px"></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ─── MULTI-PIEZA ───────────────────────────────
let _lineas=[];
function lineaEmpty(){ return{id:uid(),piezaId:'',filamentoId:'__manual__',nombre:'',material:'PLA',peso:'',tiempoImpresion:'',qty:1}; }
function calcLineasTotals(lineas){return{pesoTotal:lineas.reduce((s,l)=>s+(parseFloat(l.peso)||0)*(parseInt(l.qty)||1),0),tiempoTotal:lineas.reduce((s,l)=>s+(parseFloat(l.tiempoImpresion)||0)*(parseInt(l.qty)||1),0)};}

function renderLineas(){
  const parts=_cache.piezas; const filaments=_cache.filamentos;
  const pOpts=[{value:'',label:'── Sin plantilla ──'},...parts.map(p=>({value:p.id,label:p.nombre}))];
  const filOpts=[{value:'__manual__',label:'── Manual ──'},...filaments.map(f=>({value:f.id,label:`${f.tipo} · ${f.marca}${f.color?' · '+f.color:''}`}))];
  const rows=_lineas.map((l,i)=>{
    const selFil=filaments.find(f=>f.id===l.filamentoId);
    const usingFil=l.filamentoId&&l.filamentoId!=='__manual__'&&selFil;
    return`<div style="background:#070e1c;border:1px solid #132540;border-radius:12px;padding:14px 16px;margin-bottom:10px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<span style="font-size:11px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1px">Pieza ${i+1}</span>
${_lineas.length>1?`<button class="btn-icon" style="color:#f87171;font-size:12px;padding:3px 8px;border:1px solid rgba(239,68,68,.25);border-radius:6px" onclick="removeLinea('${l.id}')">✕ Quitar</button>`:''}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px">
<div class="field"><label>Plantilla</label><select onchange="applyPiezaPlantilla('${l.id}',this.value)" style="font-size:13px">${pOpts.map(o=>`<option value="${esc(o.value)}"${o.value===l.piezaId?' selected':''}>${esc(o.label)}</option>`).join('')}</select></div>
<div class="field"><label>Descripción *</label><input type="text" value="${esc(l.nombre)}" oninput="updateLinea('${l.id}','nombre',this.value)" placeholder="Ej: Soporte lateral"></div>
<div class="field"><label>Filamento del stock</label><select onchange="applyFilamento('${l.id}',this.value)" style="font-size:13px">${filOpts.map(o=>`<option value="${esc(o.value)}"${o.value===(l.filamentoId||'__manual__')?' selected':''}>${esc(o.label)}</option>`).join('')}</select></div>
<div class="field"><label>Tipo de material</label>${usingFil?`<div style="display:flex;align-items:center;gap:8px;background:#0f1e35;border:1.5px solid #1a2e4a;border-radius:10px;padding:10px 14px"><span style="width:14px;height:14px;border-radius:50%;background:${esc(selFil.color||'#888')};border:1px solid #2a4470;flex-shrink:0;display:inline-block"></span><span style="color:#e2eaf4;font-weight:600">${esc(selFil.tipo)}</span><span style="color:#3d5a7a;font-size:12px">· ${esc(selFil.marca)}</span></div>`:`<select onchange="updateLinea('${l.id}','material',this.value)">${MATS.map(m=>`<option${m===l.material?' selected':''}>${m}</option>`).join('')}</select>`}</div>
<div class="field"><label>Cantidad</label><input type="number" min="1" value="${l.qty||1}" oninput="updateLinea('${l.id}','qty',this.value);refreshCostPreview()"></div>
<div class="field"><label>Peso unitario (g)</label><input type="number" min="0" step="0.1" value="${esc(l.peso)}" oninput="updateLinea('${l.id}','peso',this.value);refreshCostPreview()" placeholder="0"></div>
<div class="field" style="grid-column:1/-1"><label>Tiempo unitario (h)</label><input type="number" min="0" step="0.1" value="${esc(l.tiempoImpresion)}" oninput="updateLinea('${l.id}','tiempoImpresion',this.value);refreshCostPreview()" placeholder="0"></div>
</div></div>`;}).join('');
  const el=document.getElementById('lineas-container');
  if(el)el.innerHTML=rows;
  refreshCostPreview();
}

function addLinea(){_lineas.push(lineaEmpty());renderLineas();}
function removeLinea(id){_lineas=_lineas.filter(l=>l.id!==id);renderLineas();}
function updateLinea(id,field,val){const l=_lineas.find(x=>x.id===id);if(l)l[field]=val;}
function applyPiezaPlantilla(lid,pid){const l=_lineas.find(x=>x.id===lid);if(!l)return;l.piezaId=pid;if(pid){const p=_cache.piezas.find(x=>x.id===pid);if(p){l.nombre=p.nombre;l.material=p.material;l.peso=p.peso;l.tiempoImpresion=p.tiempoImpresion;}}renderLineas();}
function applyFilamento(lid,fid){const l=_lineas.find(x=>x.id===lid);if(!l)return;l.filamentoId=fid;if(fid&&fid!=='__manual__'){const f=_cache.filamentos.find(x=>x.id===fid);if(f)l.material=f.tipo;}renderLineas();}

function refreshCostPreview(){
  const cfg=_cache.cfg; const filaments=_cache.filaments||_cache.filamentos;
  const pp=parseFloat(document.querySelector('[name="costePostprocesado"]')?.value||0);
  const gm=document.querySelector('[name="gananciaManual"]')?.value||'';
  let mc=0,pesoTotal=0,tiempoTotal=0;
  for(const l of _lineas){const qty=parseInt(l.qty)||1;const peso=(parseFloat(l.peso)||0)*qty;const tiempo=(parseFloat(l.tiempoImpresion)||0)*qty;pesoTotal+=peso;tiempoTotal+=tiempo;let cg=parseFloat(cfg.costePorGramo)||0.03;if(l.filamentoId&&l.filamentoId!=='__manual__'){const fil=_cache.filamentos.find(f=>f.id===l.filamentoId);if(fil)cg=(parseFloat(fil.precioPorKg)||0)/1000;}mc+=peso*cg;}
  const ec=tiempoTotal*(parseFloat(cfg.costePorHora)||0.15);
  const tc=mc+ec+pp;const fp=gm?tc+parseFloat(gm):tc*(1+(parseFloat(cfg.margen)||30)/100);
  const c={mc,ec,pp,tc,fp,profit:fp-tc};
  const tp=$('total-peso');const tt=$('total-tiempo');const tpz=$('total-piezas');
  if(tp)tp.textContent=pesoTotal.toFixed(1)+'g';if(tt)tt.textContent=tiempoTotal.toFixed(2)+'h';if(tpz)tpz.textContent=_lineas.reduce((s,l)=>s+(parseInt(l.qty)||1),0);
  const el=document.getElementById('cprev');if(el)el.innerHTML=costPrevHTML(c);
}

function costPrevHTML(c){return[['Coste filamentos',c.mc.toFixed(3)+'€','#7a9ab8'],['Electricidad',c.ec.toFixed(3)+'€','#7a9ab8'],['Postprocesado',c.pp.toFixed(2)+'€','#7a9ab8'],['Coste total',c.tc.toFixed(2)+'€','#fbbf24'],['Beneficio',c.profit.toFixed(2)+'€',c.profit>=0?'#34d399':'#f87171'],['PRECIO FINAL',c.fp.toFixed(2)+'€','#60a5fa']].map(([l,v,col])=>`<div class="cost-item"><div class="cost-lbl">${l}</div><div class="cost-val" style="color:${col}">${v}</div></div>`).join('');}

function pedidoFrm(x={}){
  const cfg=_cache.cfg;
  const cliOpts=[{value:'',label:'Sin cliente'},..._cache.clientes.map(c=>({value:c.id,label:c.nombre}))];
  const estOpts=['pendiente','imprimiendo','terminado','entregado','pagado'];
  if(x.lineas&&x.lineas.length>0)_lineas=[...x.lineas.map(l=>({...l,id:l.id||uid(),filamentoId:l.filamentoId||'__manual__'}))];
  else _lineas=[lineaEmpty()];
  const filaments=_cache.filamentos;
  let mcInit=0,pesoInit=0,tiempoInit=0;
  for(const l of _lineas){const qty=parseInt(l.qty)||1;const p=(parseFloat(l.peso)||0)*qty;const t=(parseFloat(l.tiempoImpresion)||0)*qty;pesoInit+=p;tiempoInit+=t;let cg=parseFloat(cfg.costePorGramo)||0.03;if(l.filamentoId&&l.filamentoId!=='__manual__'){const fil=filaments.find(f=>f.id===l.filamentoId);if(fil)cg=(parseFloat(fil.precioPorKg)||0)/1000;}mcInit+=p*cg;}
  const ecInit=tiempoInit*(parseFloat(cfg.costePorHora)||0.15);const ppInit=parseFloat(x.costePostprocesado||0);const tcInit=mcInit+ecInit+ppInit;const fpInit=x.gananciaManual?tcInit+parseFloat(x.gananciaManual):tcInit*(1+(parseFloat(cfg.margen)||30)/100);
  const c={mc:mcInit,ec:ecInit,pp:ppInit,tc:tcInit,fp:fpInit,profit:fpInit-tcInit};
  return`<div class="grid2" style="margin-bottom:4px">
${fld('Nombre del proyecto *','proyecto',x.proyecto||'')}${fld('Cliente','clienteId',x.clienteId||'','text',cliOpts)}
${fld('Estado','estado',x.estado||'pendiente','text',estOpts)}${fld('Fecha','fecha',x.fecha||today(),'date')}
${fld('Coste postprocesado (€)','costePostprocesado',x.costePostprocesado||'0','number')}${fld('Ganancia manual (€) — vacío = margen','gananciaManual',x.gananciaManual||'','number')}
</div>${fld('Notas','notas',x.notas||'','textarea')}
<div style="display:flex;justify-content:space-between;align-items:center;margin:18px 0 12px">
<div><div style="font-size:12px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1px">Piezas del pedido</div><div style="font-size:11px;color:#3d5a7a;margin-top:2px">Cada pieza se imprime por separado.</div></div>
<button class="btn-secondary" style="font-size:12px;padding:7px 14px;white-space:nowrap" onclick="addLinea()">+ Añadir pieza</button></div>
<div id="lineas-container"></div>
<div style="background:#070e1c;border:1px solid #132540;border-radius:12px;padding:12px 16px;margin:12px 0;display:flex;gap:24px">

function editO(id){
  const x=id?_cache.pedidos.find(o=>o.id===id)||{}:{};
  openModal(msh(id?'Editar pedido':'Nuevo pedido',`${pedidoFrm(x)}<div style="display:flex;gap:10px;margin-top:16px"><button class="btn-primary" id="save-o-btn" onclick="saveO('${id||''}')">💾 Guardar pedido</button><button class="btn-secondary" onclick="closeModal()">Cancelar</button></div>`),true);
  attachPedidoEvents();
}

async function saveO(id){
  const d=gfd(['clienteId','proyecto','estado','notas','fecha','gananciaManual','costePostprocesado']);
  if(!d.proyecto.trim()){alert('Proyecto obligatorio');return;}
  if(_lineas.length===0){alert('Añade al menos una pieza');return;}
  setLoading('save-o-btn',true);

  const {pesoTotal,tiempoTotal}=calcLineasTotals(_lineas);
  const firstLinea=_lineas[0]||{};
  const mainMat=firstLinea.material||'PLA';
  const mainFilId=firstLinea.filamentoId&&firstLinea.filamentoId!=='__manual__'?firstLinea.filamentoId:null;

  // Discount filament stock
  const prevOrder=_cache.pedidos.find(o=>o.id===id);
  const prevPeso=prevOrder?parseFloat(prevOrder.peso)||0:0;
  const diff=pesoTotal-prevPeso;
  if(diff>0){
    const filId=mainFilId||null;
    if(filId){const f=_cache.filamentos.find(x=>x.id===filId);if(f){const nv=Math.max(0,parseFloat(f.pesoRestante)-diff);await dbSave('filamentos',{id:f.id,peso_restante:nv});_cache.filamentos=_cache.filamentos.map(x=>x.id===f.id?{...x,pesoRestante:nv}:x);}}
    else if(mainMat){const f=_cache.filamentos.find(x=>x.tipo===mainMat);if(f){const nv=Math.max(0,parseFloat(f.pesoRestante)-diff);await dbSave('filamentos',{id:f.id,peso_restante:nv});_cache.filamentos=_cache.filamentos.map(x=>x.id===f.id?{...x,pesoRestante:nv}:x);}}
  }

  let presNum=prevOrder?.presNum||'';
  if(!id)presNum=await nextPresNum();

  const row={proyecto:d.proyecto,cliente_id:d.clienteId||null,material:mainMat,peso:pesoTotal.toFixed(1),tiempo_impresion:tiempoTotal.toFixed(2),estado:d.estado,notas:d.notas,fecha:d.fecha||null,ganancia_manual:d.gananciaManual||null,coste_postprocesado:d.costePostprocesado||0,pres_num:presNum,lineas:_lineas,factura_num:prevOrder?.facturaNum||null,factura_fecha:prevOrder?.facturaFecha||null};
  if(id)row.id=id;else row.id=uid();
  const ok=await dbSave('pedidos',row);
  if(ok){
    const mapped={id:row.id,clienteId:d.clienteId,proyecto:d.proyecto,material:mainMat,peso:pesoTotal.toFixed(1),tiempoImpresion:tiempoTotal.toFixed(2),estado:d.estado,notas:d.notas,fecha:d.fecha,gananciaManual:d.gananciaManual,costePostprocesado:d.costePostprocesado,presNum:presNum,facturaNum:prevOrder?.facturaNum||null,facturaFecha:prevOrder?.facturaFecha||null,lineas:_lineas};
    if(id)_cache.pedidos=_cache.pedidos.map(o=>o.id===id?mapped:o);else _cache.pedidos.push(mapped);
    closeModal();render();refreshAlerts();showToast('Pedido guardado','ok');
  }
}

function delO(id){ confirmDel('¿Eliminar este pedido?',`doDelO('${id}')`); }

function pgArchivos(){
  const files=_cache.archivos;

<div class="card" style="width:170px;padding:14px">
<div class="file-thumb" ${f.is_image?`onclick="prevFile('${f.id}')" style="cursor:pointer"`:''}>${f.is_image&&f._url?`<img src="${f._url}" alt="${esc(f.name)}">`:`<span style="font-size:40px">${f.is_stl?'🔷':'📄'}</span>`}</div>

  return`<h2 class="page-title" style="margin-bottom:4px">Archivos</h2>
<p style="color:#3d5a7a;font-size:13px;margin-bottom:16px">STL e imágenes — guardados en Supabase Storage (máx. 50MB).</p>
<div class="dropzone" id="dz" onclick="$('fi').click()">
<input type="file" id="fi" multiple accept=".stl,image/*" style="display:none" onchange="procFiles(this.files)">
<div style="font-size:44px;margin-bottom:10px">📁</div>
<div style="color:#7a9ab8;font-size:14px;font-weight:500">Arrastra archivos o haz clic</div>
<div style="color:#3d5a7a;font-size:12px;margin-top:6px">STL, JPG, PNG, WebP, GIF</div>
</div>
<div class="flexwrap">${cards}</div>`;
}

function initDZ(){
  const dz=$('dz');if(!dz)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');procFiles(e.dataTransfer.files);});
}

async function procFiles(fl){
  for(const f of Array.from(fl)){
    if(f.size>50*1024*1024){showToast(f.name+' supera 50MB','err');continue;}
    showToast('Subiendo '+f.name+'…','ok',8000);
    const path=`${CU.id}/${Date.now()}_${f.name}`;
    const {error:upErr}=await sb.storage.from('archivos').upload(path,f);
    if(upErr){showToast('Error subiendo: '+upErr.message,'err');continue;}
    const isImage=f.type.startsWith('image/');
    const isSTL=f.name.toLowerCase().endsWith('.stl');
    const row={id:uid(),name:f.name,size:f.size,type:f.type,is_image:isImage,is_stl:isSTL,storage_path:path,fecha:today()};
    const {error:dbErr}=await sb.from('archivos').insert({...row,user_id:CU.id});
    if(dbErr){showToast('Error registrando: '+dbErr.message,'err');continue;}
    // Get signed URL for images
    let _url=null;
    if(isImage){const {data}=await sb.storage.from('archivos').createSignedUrl(path,3600);_url=data?.signedUrl||null;}
    _cache.archivos.push({...row,_url});
    showToast(f.name+' subido ✓','ok');
    render();
  }
}

async function dlFile(id){
  const f=_cache.archivos.find(x=>x.id===id);if(!f)return;
  const {data,error}=await sb.storage.from('archivos').createSignedUrl(f.storage_path,60);
  if(error){showToast('Error al descargar','err');return;}
  const a=document.createElement('a');a.href=data.signedUrl;a.download=f.name;a.click();
}

async function delFile(id){
  const f=_cache.archivos.find(x=>x.id===id);if(!f)return;
  await sb.storage.from('archivos').remove([f.storage_path]);
  await dbDel('archivos',id);
  _cache.archivos=_cache.archivos.filter(x=>x.id!==id);
  render();showToast('Eliminado','ok');
}

async function prevFile(id){
  const f=_cache.archivos.find(x=>x.id===id);if(!f)return;
  let url=f._url;
  if(!url){const {data}=await sb.storage.from('archivos').createSignedUrl(f.storage_path,3600);url=data?.signedUrl;}
  if(!url){showToast('No se pudo obtener la imagen','err');return;}
  openModal(msh(f.name,`<img src="${url}" alt="${esc(f.name)}" style="max-width:100%;border-radius:8px">`),true);
}

async function dbSave(table, data){
  const payload = {...data, user_id: CU.id};
  let error;
  // Check if record exists (has id that's already saved)
  const existing = _cache[table]?.find?.(x=>x.id===data.id);
  if(data.id && existing){
    const res = await sb.from(table).update(payload).eq('id', data.id).eq('user_id', CU.id);
    error = res.error;
  } else {
    const res = await sb.from(table).insert(payload);
    error = res.error;
  }
