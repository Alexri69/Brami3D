<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>B3D — Gestión de Impresión 3D</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}body{background:#070e1c;color:#c2d3e8;font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e3352;border-radius:99px}input,select,textarea{font-family:inherit;background:#0f1e35;border:1.5px solid #1a2e4a;border-radius:10px;color:#e2eaf4;padding:10px 14px;font-size:14px;width:100%;box-sizing:border-box;outline:none;transition:border-color .2s,box-shadow .2s}input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.14);background:#112040}input::placeholder{color:#2e4a6a}select{cursor:pointer;appearance:none}textarea{resize:vertical;min-height:72px}button{cursor:pointer;font-family:inherit;transition:all .2s ease}button:active{transform:scale(.97)!important}label{display:block;font-size:11px;color:#3d5a7a;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.9px}table{width:100%;border-collapse:collapse}th{color:#2e4a6a;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:11px 16px;text-align:left;border-bottom:1px solid #0f1e35;white-space:nowrap;background:#070e1c;position:sticky;top:0;z-index:1}td{padding:14px 16px;color:#7a9ab8;font-size:13px;border-bottom:1px solid #0a1525;vertical-align:middle;transition:background .15s}tr:hover td{background:rgba(59,130,246,.05)}tbody tr:last-child td{border-bottom:none}
