<script>
// Inject PWA manifest dynamically
const manifest = {
  name: 'B3D Print Studio',
  short_name: 'B3D',

  background_color: '#070e1c',

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

/* ─── DARK THEME (default) ─── */
:root{
  --bg:        #070e1c;
  --bg2:       #0d1e36;
  --bg3:       #0a1828;
  --bg4:       #0f1e35;
  --border:    #132540;
  --border2:   #1a2e4a;
  --text:      #c2d3e8;
  --text2:     #e2eaf4;
  --text3:     #7a9ab8;
  --text4:     #3d5a7a;
  --text5:     #2e4a6a;
  --accent:    #3b82f6;
  --topbar-bg: rgba(7,14,28,.95);
}

/* ─── LIGHT THEME ─── */
body.light{
  --bg:        #f1f5f9;
  --bg2:       #ffffff;
  --bg3:       #f8fafc;
  --bg4:       #ffffff;
  --border:    #e2e8f0;
  --border2:   #cbd5e1;
  --text:      #334155;
  --text2:     #0f172a;
  --text3:     #64748b;
  --text4:     #94a3b8;
  --text5:     #94a3b8;
  --accent:    #2563eb;
  --topbar-bg: rgba(248,250,252,.95);
}

body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e3352;border-radius:99px}
input,select,textarea{font-family:inherit;background:var(--bg4);border:1.5px solid var(--border2);border-radius:10px;color:var(--text2);padding:10px 14px;font-size:14px;width:100%;box-sizing:border-box;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.14);background:var(--bg4)}
input::placeholder{color:var(--text4)}select{cursor:pointer;appearance:none}textarea{resize:vertical;min-height:72px}
button{cursor:pointer;font-family:inherit;transition:all .2s ease}button:active{transform:scale(.97)!important}
label{display:block;font-size:11px;color:var(--text4);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.9px}
table{width:100%;border-collapse:collapse}
th{color:var(--text5);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:11px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg);position:sticky;top:0;z-index:1}
td{padding:14px 16px;color:var(--text3);font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;transition:background .15s}
tr:hover td{background:rgba(59,130,246,.05)}tbody tr:last-child td{border-bottom:none}
.card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.card-title{font-size:10px;font-weight:800;color:var(--text5);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:18px}
.field{margin-bottom:17px}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;gap:16px}
.page-title{font-size:26px;font-weight:900;color:var(--text2);letter-spacing:-.8px;line-height:1}
.page-subtitle{font-size:13px;color:var(--text4);margin-top:4px;font-weight:500}
.flexwrap{display:flex;flex-wrap:wrap;gap:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);padding:16px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:18px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.75);animation:slideUp .22s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
.modal-wide{max-width:760px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:22px 26px 0}
.modal-title{font-size:19px;font-weight:800;color:var(--text2);letter-spacing:-.4px}.modal-body{padding:24px 26px}
.close-btn{background:var(--bg4);border:1.5px solid var(--border2);color:var(--text4);font-size:15px;line-height:1;padding:5px 10px;border-radius:8px;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:3px 12px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.4px;white-space:nowrap}
.nav-btn{display:flex;align-items:center;gap:12px;width:100%;padding:11px 18px;background:none;border:none;border-right:3px solid transparent;color:var(--text4);text-align:left;font-size:13.5px;transition:all .18s;white-space:nowrap}
.nav-btn:hover{background:rgba(59,130,246,.07);color:#7aabcc;transform:none;opacity:1}
.nav-btn.active{background:linear-gradient(90deg,rgba(37,99,235,.18),rgba(37,99,235,.06));border-right-color:#3b82f6;color:#93c5fd;font-weight:600}
.chip{padding:6px 15px;border-radius:99px;border:1.5px solid var(--border);background:none;color:var(--text4);font-size:12px;font-weight:600;transition:all .18s}
.chip:hover{border-color:var(--border2);color:var(--text3);transform:none}
.chip.active{background:linear-gradient(135deg,rgba(37,99,235,.2),rgba(29,78,216,.12));color:#93c5fd;border-color:#2563eb}
.warn-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#f87171;display:flex;align-items:center;gap:8px}
.cost-box{background:var(--bg);border:1px solid var(--border);border-radius:13px;padding:16px;margin-top:10px}
.cost-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.cost-item{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.cost-lbl{font-size:10px;color:var(--text5);text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px;font-weight:700}
.cost-val{font-weight:800;font-family:'Courier New',monospace;font-size:16px}
.dropzone{border:2px dashed var(--border);border-radius:14px;padding:48px 20px;text-align:center;cursor:pointer;background:var(--bg);transition:all .22s;margin-bottom:22px}
.dropzone:hover,.dropzone.over{border-color:#3b82f6;background:rgba(37,99,235,.07)}
.file-thumb{height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;background:var(--bg);border-radius:10px;overflow:hidden}
.file-thumb img{max-height:94px;max-width:100%;object-fit:cover}
.progress-track{height:7px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;border-radius:99px;transition:width .5s ease}
.num-badge{display:inline-block;background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:800;font-family:'Courier New',monospace;letter-spacing:.5px}
.stat-card{flex:1;min-width:155px}
.bar-chart{display:flex;gap:8px;align-items:flex-end;height:110px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:linear-gradient(180deg,#3b82f6,#1d4ed8);border-radius:6px 6px 0 0;transition:height .5s cubic-bezier(.34,1.2,.64,1);min-height:4px}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{background:linear-gradient(180deg,var(--bg),var(--bg3));border-right:1px solid var(--border);display:flex;flex-direction:column;width:224px;flex-shrink:0;overflow:hidden;transition:width .22s ease}
#sidebar.collapsed{width:66px}
#sb-logo{display:flex;align-items:center;gap:12px;padding:20px 18px 18px;cursor:pointer;border-bottom:1px solid var(--border);margin-bottom:10px;user-select:none}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:var(--topbar-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;min-height:56px;z-index:10;gap:12px}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 32px;min-height:0}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 0 0 2px rgba(59,130,246,.3)}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 35%,var(--bg2) 0%,var(--bg) 65%)}
.auth-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:390px;box-shadow:0 40px 100px rgba(0,0,0,.65)}
.tabs{display:flex;background:var(--bg);border-radius:11px;padding:4px;margin-bottom:24px;gap:3px}
.tab{flex:1;padding:9px 0;background:transparent;border:none;color:var(--text4);border-radius:8px;font-size:14px;font-weight:500}
.tab.active{background:linear-gradient(145deg,var(--bg2),var(--bg3));color:var(--text2);font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.err-msg{color:#f87171;font-size:13px;margin-bottom:12px;background:rgba(239,68,68,.1);padding:10px 14px;border-radius:9px;border:1px solid rgba(239,68,68,.22)}
.hidden{display:none!important}
.loading-spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;color:var(--text2);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;animation:slideUp .25s ease;max-width:320px}
.toast.ok{border-color:rgba(34,197,94,.4);color:#4ade80}
.toast.err{border-color:rgba(239,68,68,.4);color:#f87171}
.mob-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(37,99,235,.35);display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{box-shadow:0 6px 20px rgba(37,99,235,.5);transform:translateY(-1px)}
.btn-secondary{background:var(--bg4);color:var(--text3);border:1.5px solid var(--border2);border-radius:10px;padding:9px 16px;font-weight:600;font-size:13px}
.btn-secondary:hover{background:var(--bg2);border-color:var(--border);color:var(--text2);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-weight:700;font-size:14px;box-shadow:0 4px 12px rgba(239,68,68,.25)}
.btn-danger:hover{box-shadow:0 6px 18px rgba(239,68,68,.4);transform:translateY(-1px)}
.btn-icon{background:none;border:none;font-size:16px;opacity:.5;padding:6px 7px;border-radius:8px;transition:all .15s;line-height:1}
.btn-icon:hover{opacity:1;background:rgba(128,128,128,.1);transform:none!important}
.fact-btn{color:#4ade80!important;opacity:1!important}.fact-btn:hover{background:rgba(34,197,94,.1)!important}

/* ─── MOBILE ─── */
#mob-nav{display:none}
@media(max-width:768px){
  #sidebar{display:none!important}
  #mob-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#070e1c;border-top:1px solid #132540;
    z-index:100;padding:6px 0 max(6px,env(safe-area-inset-bottom));
  }
  #mob-nav button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;color:#3d5a7a;font-size:9px;font-weight:600;
    padding:6px 2px;transition:color .18s;letter-spacing:.3px;text-transform:uppercase;
  }
  #mob-nav button .mico{font-size:20px;line-height:1}
  #mob-nav button.active{color:#60a5fa}
  #mob-nav button.active .mico{filter:drop-shadow(0 0 6px rgba(96,165,250,.6))}
  #mob-logout{color:#f87171!important}
  #content{padding:16px;padding-bottom:80px!important}
  #topbar{padding:8px 12px;gap:8px}
  #tb-company{display:none}
  #global-search{font-size:14px!important}
  .page-title{font-size:20px}
  .page-header{margin-bottom:16px}
  /* Cards for mobile lists */
  .mob-card{background:linear-gradient(145deg,#0d1e36,#0a1828);border:1px solid #132540;border-radius:14px;padding:16px;margin-bottom:10px}
  .mob-card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .mob-card-label{font-size:10px;color:#2e4a6a;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
  .mob-card-val{font-size:13px;color:#7a9ab8;text-align:right}
  .mob-card-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #132540}
  .mob-card-actions button{flex:1;padding:10px;font-size:13px;border-radius:10px}
  /* Bigger touch targets */
  .btn-icon{padding:10px!important;font-size:18px!important;opacity:.7!important}
  input,select,textarea{font-size:16px!important} /* prevents iOS zoom */
  .modal{max-width:100%!important;border-radius:18px 18px 0 0!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;max-height:90vh!important}
  .overlay{align-items:flex-end!important;padding:0!important}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none"><rect width="38" height="38" rx="9" fill="#1d4ed8"/><polygon points="19,7 30,13 30,25 19,31 8,25 8,13" fill="none" stroke="#93c5fd" stroke-width="1.5"/><polygon points="19,7 30,13 19,19 8,13" fill="#3b82f6" opacity="0.8"/><polygon points="8,13 19,19 19,31 8,25" fill="#2563eb"/><polygon points="30,13 19,19 19,31 30,25" fill="#1d4ed8"/></svg>
      <div><div style="font-size:24px;font-weight:900;color:#f1f5f9;letter-spacing:-1.5px">B3D</div><div style="font-size:10px;color:#3b82f6;font-weight:600;letter-spacing:2px;text-transform:uppercase">Print Studio</div></div>
    </div>
    <p style="color:#3d5a7a;font-size:13px;margin-bottom:28px">Gestión profesional de impresión 3D</p>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Registrarse</button>
    </div>
    <div id="name-field" class="field hidden"><label>Nombre</label><input id="a-name" type="text" placeholder="Tu nombre"></div>
    <div class="field"><label>Email</label><input id="a-email" type="email" placeholder="tu@email.com"></div>
    <div class="field"><label>Contraseña</label><input id="a-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"></div>
    <div id="a-err" class="err-msg hidden"></div>
    <button class="btn-primary" style="width:100%;margin-top:4px;justify-content:center" id="auth-btn" onclick="doAuth()">Entrar</button>
    <div id="reset-wrap" style="text-align:center;margin-top:14px">
      <button onclick="doReset()" style="background:none;border:none;color:#3d5a7a;font-size:12px;cursor:pointer;text-decoration:underline">¿Olvidaste tu contraseña?</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div id="sidebar">
    <div id="sb-logo" onclick="toggleSb()">
      <svg width="30" height="30" viewBox="0 0 38 38" fill="none" style="flex-shrink:0"><rect width="38" height="38" rx="9" fill="#1d4ed8"/><polygon points="19,7 30,13 30,25 19,31 8,25 8,13" fill="none" stroke="#93c5fd" stroke-width="1.5"/><polygon points="19,7 30,13 19,19 8,13" fill="#3b82f6" opacity="0.8"/><polygon points="8,13 19,19 19,31 8,25" fill="#2563eb"/><polygon points="30,13 19,19 19,31 30,25" fill="#1d4ed8"/></svg>
      <div id="brand-lbl" style="white-space:nowrap"><div style="font-size:16px;font-weight:900;color:#f1f5f9;letter-spacing:-1px;line-height:1.1">B3D</div><div style="font-size:9px;color:#3b82f6;font-weight:600;letter-spacing:1.5px;text-transform:uppercase">Print Studio</div></div>
    </div>
    <nav id="sb-nav" style="flex:1;overflow-y:auto;overflow-x:hidden"></nav>
    <div style="border-top:1px solid #0d1c30;padding:8px 0">
      <button class="nav-btn" onclick="logout()" style="color:#ef4444"><span style="font-size:18px;flex-shrink:0">🚪</span><span id="logout-lbl">Cerrar sesión</span></button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
        <div id="tb-company" style="font-size:16px;font-weight:700;color:#60a5fa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;max-width:160px"></div>
        <div style="flex:1;max-width:380px;position:relative">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none">🔍</span>
          <input id="global-search" type="text" placeholder="Buscar clientes, pedidos, piezas…"
            style="padding:9px 14px 9px 36px;font-size:13px;background:#0f1e35;border:1.5px solid #1a2e4a;border-radius:10px;color:#e2eaf4;width:100%"

let authMode = 'login';

function switchTab(m){
  authMode=m;
  $('tab-login').className='tab'+(m==='login'?' active':'');
  $('tab-signup').className='tab'+(m==='signup'?' active':'');

  $('a-err').className='err-msg hidden';
}

async function doAuth(){
  const email=$('a-email').value.trim();
  const pass =$('a-pass').value;
  const name =$('a-name').value.trim();
  $('a-err').className='err-msg hidden';
  setLoading('auth-btn',true);

  let err=null;
  if(authMode==='login'){
    const r=await sb.auth.signInWithPassword({email,password:pass});
    err=r.error;
  } else {
    if(!name||!email||!pass){ showAuthErr('Rellena todos los campos'); setLoading('auth-btn',false); return; }
    const r=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
    err=r.error;
    if(!err) showToast('¡Cuenta creada! Revisa tu email para confirmar.','ok',5000);
  }

  setLoading('auth-btn',false);
  if(err) showAuthErr(err.message);
}

async function doReset(){
  const email=$('a-email').value.trim();
  if(!email){ showAuthErr('Escribe tu email primero'); return; }
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error) showAuthErr(error.message);
  else showToast('Email de recuperación enviado','ok',4000);
}

function showAuthErr(msg){ const e=$('a-err'); e.textContent=msg; e.className='err-msg'; }

// Listen to auth state
sb.auth.onAuthStateChange(async (event, session)=>{

});

})();

async function bootApp(){
  $('auth-screen').className='hidden';

  if(window.innerWidth<=768) $('mob-nav').className='';
  buildNav();
  $('content').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:60vh"><div style="text-align:center"><div class="loading-spinner" style="width:32px;height:32px;border-width:3px;margin:0 auto 16px"></div><div style="color:#3d5a7a;font-size:13px">Cargando...</div></div></div>';
  try {
    await loadAll();
    goTo('dashboard');
  } catch(e) {
    $('content').innerHTML='<div style="padding:32px;color:#f87171;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:12px;margin:24px">❌ Error al cargar: '+e.message+'<br><br><button class="btn-primary" onclick="bootApp()">🔄 Reintentar</button></div>';
  }
}

// ═══════════════════════════════════════════════
//  DATA LAYER — Supabase CRUD
// ═══════════════════════════════════════════════
async function loadAll(){
  const userId=CU.id;
  const show = msg => { const el=$('content'); if(el) el.innerHTML='<p style="color:#60a5fa;padding:20px">'+msg+'</p>'; };

  // Helper with timeout
  const qry = (promise, name) => Promise.race([
    promise,
    new Promise((_,reject)=>setTimeout(()=>reject(new Error(name+' timeout (10s)')),10000))
  ]);

  show('Cargando clientes...');
  const c = await qry(sb.from('clientes').select('*').eq('user_id',userId).order('created_at'), 'clientes');
  if(c.error) throw new Error('clientes: '+c.error.message);
  _cache.clientes = c.data||[];

  show('Cargando pedidos...');
  const p = await qry(sb.from('pedidos').select('*').eq('user_id',userId).order('created_at', {ascending:false}), 'pedidos');
  if(p.error) throw new Error('pedidos: '+p.error.message);
  _cache.pedidos = mapPedidos(p.data||[]);

  show('Cargando impresoras...');
  const im = await qry(sb.from('impresoras').select('*').eq('user_id',userId).order('created_at'), 'impresoras');
  _cache.impresoras = mapImpresoras(im.data||[]);

  show('Cargando filamentos...');
  const fi = await qry(sb.from('filamentos').select('*').eq('user_id',userId).order('created_at'), 'filamentos');
  _cache.filamentos = mapFilamentos(fi.data||[]);

  show('Cargando piezas...');
  const pz = await qry(sb.from('piezas').select('*').eq('user_id',userId).order('created_at'), 'piezas');
  _cache.piezas = mapPiezas(pz.data||[]);

  show('Cargando archivos...');
  const ar = await qry(sb.from('archivos').select('*').eq('user_id',userId).order('created_at'), 'archivos');
  _cache.archivos = ar.data||[];

  show('Cargando configuración...');
  const cfg = await qry(sb.from('config').select('*').eq('user_id',userId).single(), 'config');
  _cache.cfg = cfg.data ? mapCfg(cfg.data) : {costePorGramo:0.03,costePorHora:0.15,margen:30,moneda:'€',empresa:'',telefono:'',email:''};

  refreshBizHeader();
}

// Map DB column names → app property names
function mapPedidos(rows){ return rows.map(r=>({
  id:r.id, clienteId:r.cliente_id, proyecto:r.proyecto, material:r.material,
  peso:r.peso, tiempoImpresion:r.tiempo_impresion, estado:r.estado, notas:r.notas,
  fecha:r.fecha, gananciaManual:r.ganancia_manual, costePostprocesado:r.coste_postprocesado,
  presNum:r.pres_num, facturaNum:r.factura_num, facturaFecha:r.factura_fecha,
  lineas:r.lineas||[], fotoUrl:r.foto_url||null, fotoPath:r.foto_path||null
}));}

function mapImpresoras(rows){ return rows.map(r=>({
  id:r.id,nombre:r.nombre,modelo:r.modelo,estado:r.estado,
  horasUso:r.horas_uso,desgaste:r.desgaste
}));}

function mapFilamentos(rows){ return rows.map(r=>({
  id:r.id,tipo:r.tipo,marca:r.marca,color:r.color,
  pesoRestante:r.peso_restante,precioPorKg:r.precio_por_kg
}));}

function mapPiezas(rows){ return rows.map(r=>({
  id:r.id,nombre:r.nombre,material:r.material,
  peso:r.peso,tiempoImpresion:r.tiempo_impresion,precioSugerido:r.precio_sugerido
}));}

function mapCfg(r){ return {
  costePorGramo:r.coste_por_gramo,costePorHora:r.coste_por_hora,
  margen:r.margen,moneda:r.moneda,empresa:r.empresa,telefono:r.telefono,email:r.email
};}

// Generic save (insert or update)
async function dbSave(table, data){
  // Convert empty strings to null for numeric/date fields
  const cleaned = {};
  for(const [k,v] of Object.entries(data)){
    cleaned[k] = (v===''||v===undefined) ? null : v;
  }
  const payload = {...cleaned, user_id: CU.id};
  const {error} = await sb.from(table).upsert(payload, {onConflict: 'id'});
  if(error){ showToast('Error: '+error.message,'err'); console.error(table, error); }
  return !error;
}

async function dbDel(table, id){
  const {error}=await sb.from(table).delete().eq('id',id).eq('user_id',CU.id);
  if(error) showToast('Error al eliminar: '+error.message,'err');
  return !error;
}

function onGlobalSearch(q){
  const box=$('search-results');
  if(!box) return;
  q=q.trim();
  if(!q){ box.style.display='none'; return; }
  const ql=q.toLowerCase();
  const cfg=_cache.cfg;

  // Search clientes
  const cls=_cache.clientes.filter(c=>[c.nombre,c.empresa,c.email,c.telefono].join(' ').toLowerCase().includes(ql)).slice(0,4);
  // Search pedidos
  const peds=_cache.pedidos.filter(o=>[o.proyecto,o.presNum,o.material,o.notas].join(' ').toLowerCase().includes(ql)).slice(0,5);
  // Search piezas
  const pzs=_cache.piezas.filter(p=>[p.nombre,p.material].join(' ').toLowerCase().includes(ql)).slice(0,3);

  if(!cls.length&&!peds.length&&!pzs.length){
    box.style.display='block';
    box.innerHTML='<div style="padding:16px;text-align:center;color:#2e4a6a;font-size:13px">Sin resultados para "'+esc(q)+'"</div>';
    return;
  }

  let html='';

  if(cls.length){
    html+=`<div style="padding:8px 14px;font-size:9px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #132540">👥 Clientes</div>`;
    html+=cls.map(c=>`<div onclick="closeSearch();goTo('clientes')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #0f1e35;transition:background .15s" onmouseover="this.style.background='rgba(59,130,246,.08)'" onmouseout="this.style.background=''">
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;flex-shrink:0">${esc(c.nombre?.charAt(0)||'?').toUpperCase()}</div>
      <div><div style="font-size:13px;font-weight:700;color:#e2eaf4">${esc(c.nombre)}</div>${c.empresa?`<div style="font-size:11px;color:#3d5a7a">${esc(c.empresa)}</div>`:''}</div>
    </div>`).join('');
  }

  if(peds.length){
    html+=`<div style="padding:8px 14px;font-size:9px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #132540;border-top:1px solid #132540">📋 Pedidos</div>`;
    html+=peds.map(o=>{
      const c=calcOrderCosts(o,cfg);
      return`<div onclick="closeSearch();goTo('pedidos')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid #0f1e35;transition:background .15s" onmouseover="this.style.background='rgba(59,130,246,.08)'" onmouseout="this.style.background=''">
        <div><div style="font-size:13px;font-weight:700;color:#e2eaf4">${esc(o.proyecto)}</div><div style="font-size:11px;color:#3d5a7a">${esc(o.presNum||'—')} · ${esc(o.fecha||'')}</div></div>
        <div style="text-align:right"><div style="font-size:13px;font-weight:800;color:#34d399">${c.fp.toFixed(2)}${cfg.moneda||'€'}</div>${mkBadge(o.estado)}</div>
      </div>`;}).join('');
  }

  if(pzs.length){
    html+=`<div style="padding:8px 14px;font-size:9px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #132540;border-top:1px solid #132540">🧩 Piezas</div>`;
    html+=pzs.map(p=>`<div onclick="closeSearch();goTo('piezas')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid #0f1e35;transition:background .15s" onmouseover="this.style.background='rgba(59,130,246,.08)'" onmouseout="this.style.background=''">
      <div><div style="font-size:13px;font-weight:700;color:#e2eaf4">${esc(p.nombre)}</div><div style="font-size:11px;color:#3d5a7a">${esc(p.material)} · ${esc(p.peso)}g</div></div>
    </div>`).join('');
  }

  box.style.display='block';
  box.innerHTML=html;
}

function fld(label,name,val,type='text',opts=null){
  const id='ff_'+name;
  if(opts){const o=opts.map(o=>`<option value="${esc(o.value??o)}"${(o.value??o)==String(val??'')?' selected':''}>${esc(o.label??o)}</option>`).join('');return`<div class="field"><label for="${id}">${esc(label)}</label><select id="${id}" name="${name}">${o}</select></div>`;}
  if(type==='textarea')return`<div class="field"><label for="${id}">${esc(label)}</label><textarea id="${id}" name="${name}">${esc(val)}</textarea></div>`;
  if(type==='color')return`<div class="field"><label for="${id}">${esc(label)}</label><input id="${id}" name="${name}" type="color" value="${esc(val)}" style="width:100%;height:42px;padding:2px 4px;border-radius:8px;background:#0f1e35;border:1.5px solid #1a2e4a;cursor:pointer"></div>`;
  return`<div class="field"><label for="${id}">${esc(label)}</label><input id="${id}" name="${name}" type="${type}" value="${esc(val??'')}"></div>`;
}
function gfd(fields){
  const o={};
  fields.forEach(f=>{
    const el=document.querySelector(`[name="${f}"]`);
    if(el){
      // Replace comma with dot for numeric fields
      let v=el.value;
      if(el.type==='number'||el.dataset.numeric) v=v.replace(',','.');
      o[f]=v;
    }
  });
  return o;
}

// ═══════════════════════════════════════════════
function calcOrderCosts(order,cfg){
  const filaments=_cache.filamentos;
  let mc=0;
  if(order.lineas&&order.lineas.length>0){
    for(const l of order.lineas){
      const qty=parseInt(l.qty)||1;
      const peso=(parseFloat(l.peso)||0)*qty;
      let costG=parseFloat(cfg.costePorGramo)||0.03;
      if(l.filamentoId&&l.filamentoId!=='__manual__'){
        const fil=filaments.find(f=>f.id===l.filamentoId);
        if(fil) costG=(parseFloat(fil.precioPorKg)||0)/1000;
      }
      mc+=peso*costG;
    }
  } else {
    mc=(parseFloat(order.peso)||0)*(parseFloat(cfg.costePorGramo)||0.03);
  }
  const ec=(parseFloat(order.tiempoImpresion)||0)*(parseFloat(cfg.costePorHora)||0.15);
  const pp=parseFloat(order.costePostprocesado||0);
  const tc=mc+ec+pp;
  const fp=order.gananciaManual?tc+parseFloat(order.gananciaManual):tc*(1+(parseFloat(cfg.margen)||30)/100);
  return{mc,ec,pp,tc,fp,profit:fp-tc};
}

function genPDF(id){
  const html=buildPDFHtml(id);if(!html)return;
  const w=window.open('','_blank');if(!w){alert('Permite ventanas emergentes');return;}
  w.document.write(html);w.document.close();
}

function downloadPDFFile(id){
  const html=buildPDFHtml(id);if(!html)return null;
  const o=_cache.pedidos.find(x=>x.id===id);if(!o)return null;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`Presupuesto_${o.proyecto.replace(/\s+/g,'_')}.html`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  return o;
}

function sendWA(id){
  const o=downloadPDFFile(id);if(!o)return;
  const cfg=_cache.cfg;
  const cl=_cache.clientes.find(x=>x.id===o.clienteId)||{};
  const c=calcOrderCosts(o,cfg);
  const mon=cfg.moneda||'€';
  const msg=`¡Hola${cl.nombre?' '+cl.nombre:''}! 👋\n\nTe adjunto el presupuesto en PDF.\n\n📋 *${o.proyecto}*\n💰 *Precio total: ${c.fp.toFixed(2)} ${mon}*\n\n_El archivo PDF se ha descargado. Adjúntalo a este mensaje._\n\n_Generado con B3D Print Studio_`;
  const ph=(cl.telefono||'').replace(/[^\d+]/g,'');
  setTimeout(()=>window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`,'_blank'),400);
}

function abrirInforme(){
  const now = new Date();
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mesOpts = meses.map((m,i)=>`<option value="${String(i+1).padStart(2,'0')}"${i===now.getMonth()?' selected':''}>${m}</option>`).join('');
  const anioActual = now.getFullYear();
  const anioOpts = [anioActual-1, anioActual].map(y=>`<option value="${y}"${y===anioActual?' selected':''}>${y}</option>`).join('');
  openModal(msh('Exportar informe mensual',`
    <p style="color:#3d5a7a;font-size:13px;margin-bottom:20px">Selecciona el mes y año para generar el informe en PDF.</p>
    <div class="grid2">
      <div class="field"><label>Mes</label><select name="inf-mes">${mesOpts}</select></div>
      <div class="field"><label>Año</label><select name="inf-anio">${anioOpts}</select></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn-primary" onclick="generarInforme()" style="flex:1;justify-content:center">📊 Generar PDF</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
  `));
}

function generarInforme(){
  const mes  = document.querySelector('[name="inf-mes"]')?.value;

  if(!mes||!anio) return;
  const cfg = _cache.cfg; const biz = cfg;
  const mon = cfg.moneda||'€';
  const prefix = `${anio}-${mes}`;
  const meses = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mesNombre = meses[parseInt(mes)];

  // Filter orders for this month
  const ordenes = _cache.pedidos.filter(o=>(o.fecha||'').startsWith(prefix));
  const pagados = ordenes.filter(o=>o.estado==='pagado');
  const pendientes = ordenes.filter(o=>o.estado==='pendiente');
  const imprimiendo = ordenes.filter(o=>o.estado==='imprimiendo');

  const totIngresos = pagados.reduce((s,o)=>s+calcOrderCosts(o,cfg).fp,0);

function pgDashboard(){
  const orders=_cache.pedidos; const cfg=_cache.cfg;
  const paid=orders.filter(o=>o.estado==='pagado');
  const totI=paid.reduce((s,o)=>s+calcOrderCosts(o,cfg).fp,0);
  const totC=paid.reduce((s,o)=>s+calcOrderCosts(o,cfg).tc,0);
  const ben=totI-totC;
  const months={};
  orders.forEach(o=>{const m=(o.fecha||'').slice(0,7);if(!m)return;if(!months[m])months[m]={i:0};if(o.estado==='pagado')months[m].i+=calcOrderCosts(o,cfg).fp;});
  const mks=Object.keys(months).sort().slice(-7);
  const maxI=Math.max(...mks.map(m=>months[m].i),1);
  const byE={};orders.forEach(o=>{byE[o.estado]=(byE[o.estado]||0)+1;});
  const pendCount=orders.filter(o=>o.estado==='pendiente').length;
  const impCount=orders.filter(o=>o.estado==='imprimiendo').length;
  const recent=[...orders].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,6);

  const stC=(lbl,val,ico,col,sub)=>`<div class="card stat-card" style="position:relative;overflow:hidden;padding:22px 24px"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:${col};opacity:.6;border-radius:16px 16px 0 0"></div><div style="font-size:10px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:12px">${lbl}</div><div style="color:${col};font-size:28px;font-weight:900;letter-spacing:-1.5px;font-family:'Courier New',monospace;line-height:1">${val}</div>${sub?`<div style="font-size:11px;color:#3d5a7a;margin-top:8px;font-weight:500">${sub}</div>`:''}</div>`;

  const recent6=recent.map(o=>{const c=calcOrderCosts(o,cfg);return`<tr><td><span class="num-badge">${esc(o.presNum||'—')}</span></td><td><span style="color:#e2e8f0;font-weight:700">${esc(o.proyecto)}</span></td><td style="color:#7a9ab8">${esc(o.material)}</td><td style="color:#34d399;font-weight:800">${c.fp.toFixed(2)}${cfg.moneda||'€'}</td><td>${mkBadge(o.estado)}</td><td style="color:#2e4a6a">${esc(o.fecha)}</td></tr>`;}).join('');

  // Filament alerts — less than 200g remaining

  const filAlert=lowFils.length===0?'':
    `<div class="card" style="margin-top:18px;border-color:rgba(245,158,11,.3);background:linear-gradient(145deg,#1a1200,#0f0d00)">

  const pendAlert = pendOld.length===0 ? '' :

  const fl=orders.filter(o=>{

    const isPagado=o.estado==='pagado';
    const hasFactura=!!o.facturaNum;
    const piezasCount=(o.lineas||[]).reduce((s,l)=>s+(parseInt(l.qty)||1),0)||'—';
    let factBtn;

let _lineas=[];
function lineaEmpty(){ return{id:uid(),piezaId:'',filamentoId:'__manual__',nombre:'',material:'PLA',peso:'',tiempoImpresion:'',qty:1}; }
function calcLineasTotals(lineas){return{pesoTotal:lineas.reduce((s,l)=>s+(parseFloat(l.peso)||0)*(parseInt(l.qty)||1),0),tiempoTotal:lineas.reduce((s,l)=>s+(parseFloat(l.tiempoImpresion)||0)*(parseInt(l.qty)||1),0)};}

function renderLineas(){
  const parts=_cache.piezas; const filaments=_cache.filamentos;

  const rows=_lineas.map((l,i)=>{
    const selFil=filaments.find(f=>f.id===l.filamentoId);
    const usingFil=l.filamentoId&&l.filamentoId!=='__manual__'&&selFil;
    return`<div style="background:#070e1c;border:1px solid #132540;border-radius:12px;padding:14px 16px;margin-bottom:10px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<span style="font-size:11px;font-weight:800;color:#2e4a6a;text-transform:uppercase;letter-spacing:1px">Pieza ${i+1}</span>
${_lineas.length>1?`<button class="btn-icon" style="color:#f87171;font-size:12px;padding:3px 8px;border:1px solid rgba(239,68,68,.25);border-radius:6px" onclick="removeLinea('${l.id}')">✕ Quitar</button>`:''}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px">
<div class="field"><label>Plantilla</label><select onchange="applyPiezaPlantilla('${l.id}',this.value)" style="font-size:13px">${pOpts.map(o=>`<option value="${esc(o.value)}"${o.value===l.piezaId?' selected':''}>${esc(o.label)}</option>`).join('')}</select></div>
<div class="field"><label>Descripción *</label><input type="text" value="${esc(l.nombre)}" oninput="updateLinea('${l.id}','nombre',this.value)" placeholder="Ej: Soporte lateral"></div>
<div class="field"><label>Filamento del stock</label><select onchange="applyFilamento('${l.id}',this.value)" style="font-size:13px">${filOpts.map(o=>`<option value="${esc(o.value)}"${o.value===(l.filamentoId||'__manual__')?' selected':''}>${esc(o.label)}</option>`).join('')}</select></div>
<div class="field"><label>Tipo de material</label>${usingFil?`<div style="display:flex;align-items:center;gap:8px;background:#0f1e35;border:1.5px solid #1a2e4a;border-radius:10px;padding:10px 14px"><span style="width:14px;height:14px;border-radius:50%;background:${esc(selFil.color||'#888')};border:1px solid #2a4470;flex-shrink:0;display:inline-block"></span><span style="color:#e2eaf4;font-weight:600">${esc(selFil.tipo)}</span><span style="color:#3d5a7a;font-size:12px">· ${esc(selFil.marca)}</span></div>`:`<select onchange="updateLinea('${l.id}','material',this.value)">${MATS.map(m=>`<option${m===l.material?' selected':''}>${m}</option>`).join('')}</select>`}</div>
<div class="field"><label>Cantidad</label><input type="number" min="1" value="${l.qty||1}" oninput="updateLinea('${l.id}','qty',this.value);refreshCostPreview()"></div>
<div class="field"><label>Peso unitario (g)</label><input type="text" inputmode="decimal" value="${esc(l.peso)}" oninput="updateLinea('${l.id}','peso',this.value.replace(',','.'));refreshCostPreview()" placeholder="0"></div>
<div class="field" style="grid-column:1/-1"><label>Tiempo unitario (h)</label><input type="text" inputmode="decimal" value="${esc(l.tiempoImpresion)}" oninput="updateLinea('${l.id}','tiempoImpresion',this.value.replace(',','.'));refreshCostPreview()" placeholder="0"></div>
</div></div>`;}).join('');
  const el=document.getElementById('lineas-container');
  if(el)el.innerHTML=rows;
  refreshCostPreview();
}

function addLinea(){_lineas.push(lineaEmpty());renderLineas();}
function removeLinea(id){_lineas=_lineas.filter(l=>l.id!==id);renderLineas();}
function updateLinea(id,field,val){const l=_lineas.find(x=>x.id===id);if(l)l[field]=val;}
function applyPiezaPlantilla(lid,pid){const l=_lineas.find(x=>x.id===lid);if(!l)return;l.piezaId=pid;if(pid){const p=_cache.piezas.find(x=>x.id===pid);if(p){l.nombre=p.nombre;l.material=p.material;l.peso=p.peso;l.tiempoImpresion=p.tiempoImpresion;}}renderLineas();}
function applyFilamento(lid,fid){const l=_lineas.find(x=>x.id===lid);if(!l)return;l.filamentoId=fid;if(fid&&fid!=='__manual__'){const f=_cache.filamentos.find(x=>x.id===fid);if(f)l.material=f.tipo;}renderLineas();}

function refreshCostPreview(){
  const cfg=_cache.cfg; const filaments=_cache.filaments||_cache.filamentos;
  const pp=parseFloat(document.querySelector('[name="costePostprocesado"]')?.value||0);
  const gm=document.querySelector('[name="gananciaManual"]')?.value||'';
  let mc=0,pesoTotal=0,tiempoTotal=0;
  for(const l of _lineas){const qty=parseInt(l.qty)||1;const peso=(parseFloat(l.peso)||0)*qty;const tiempo=(parseFloat(l.tiempoImpresion)||0)*qty;pesoTotal+=peso;tiempoTotal+=tiempo;let cg=parseFloat(cfg.costePorGramo)||0.03;if(l.filamentoId&&l.filamentoId!=='__manual__'){const fil=_cache.filamentos.find(f=>f.id===l.filamentoId);if(fil)cg=(parseFloat(fil.precioPorKg)||0)/1000;}mc+=peso*cg;}
  const ec=tiempoTotal*(parseFloat(cfg.costePorHora)||0.15);
  const tc=mc+ec+pp;const fp=gm?tc+parseFloat(gm):tc*(1+(parseFloat(cfg.margen)||30)/100);
  const c={mc,ec,pp,tc,fp,profit:fp-tc};
  const tp=$('total-peso');const tt=$('total-tiempo');const tpz=$('total-piezas');
  if(tp)tp.textContent=pesoTotal.toFixed(1)+'g';if(tt)tt.textContent=tiempoTotal.toFixed(2)+'h';if(tpz)tpz.textContent=_lineas.reduce((s,l)=>s+(parseInt(l.qty)||1),0);
  const el=document.getElementById('cprev');if(el)el.innerHTML=costPrevHTML(c);
}

function costPrevHTML(c){return[['Coste filamentos',c.mc.toFixed(2)+'€','#7a9ab8'],['Electricidad',c.ec.toFixed(2)+'€','#7a9ab8'],['Postprocesado',c.pp.toFixed(2)+'€','#7a9ab8'],['Coste total',c.tc.toFixed(2)+'€','#fbbf24'],['Beneficio',c.profit.toFixed(2)+'€',c.profit>=0?'#34d399':'#f87171'],['PRECIO FINAL',c.fp.toFixed(2)+'€','#60a5fa']].map(([l,v,col])=>`<div class="cost-item"><div class="cost-lbl">${l}</div><div class="cost-val" style="color:${col}">${v}</div></div>`).join('');}

function pedidoFrm(x={}){

  const ecInit=tiempoInit*(parseFloat(cfg.costePorHora)||0.15);const ppInit=parseFloat(x.costePostprocesado||0);const tcInit=mcInit+ecInit+ppInit;const fpInit=x.gananciaManual?tcInit+parseFloat(x.gananciaManual):tcInit*(1+(parseFloat(cfg.margen)||30)/100);

${fld('Nombre del proyecto *','proyecto',x.proyecto||'')}${fld('Cliente','clienteId',x.clienteId||'','text',cliOpts)}
${fld('Estado','estado',x.estado||'pendiente','text',estOpts)}${fld('Fecha','fecha',x.fecha||today(),'date')}

</div>${fld('Notas','notas',x.notas||'','textarea')}

<div style="margin:16px 0 12px">

// ─── FOTO DE REFERENCIA ───────────────────────
let _fotoFile = null;   // File selected but not yet uploaded
let _fotoUrl  = null;   // Current URL (existing or newly uploaded)
let _fotoPath = null;   // Storage path of current foto

function previewFoto(input){
  const f = input.files[0]; if(!f) return;
  if(f.size > 10*1024*1024){ showToast('La foto supera 10MB','err'); return; }
  _fotoFile = f;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = $('foto-preview');
    if(prev){
      prev.style.display = '';
      prev.innerHTML = `<div style="position:relative;display:inline-block">
        <img src="${e.target.result}" style="max-width:100%;max-height:180px;border-radius:10px;border:1px solid #132540;display:block">
        <button onclick="clearFoto()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:28px;height:28px;color:#f87171;font-size:14px;cursor:pointer">✕</button>
      </div>`;
    }
  };
  reader.readAsDataURL(f);
}

function clearFoto(){
  _fotoFile = null; _fotoUrl = null;
  const prev = $('foto-preview');
  if(prev){ prev.style.display='none'; prev.innerHTML=''; }
  const inp = $('foto-input');
  if(inp) inp.value='';
}

async function uploadFotoIfNeeded(orderId){
  if(!_fotoFile) return _fotoUrl; // return existing URL or null
  const ext = _fotoFile.name.split('.').pop();
  const path = `${CU.id}/pedidos/${orderId}_ref.${ext}`;
  // Delete old foto if exists
  if(_fotoPath && _fotoPath !== path){
    await sb.storage.from('archivos').remove([_fotoPath]);
  }
  const {error} = await sb.storage.from('archivos').upload(path, _fotoFile, {upsert:true});
  if(error){ showToast('Error subiendo foto: '+error.message,'err'); return _fotoUrl; }
  const {data} = await sb.storage.from('archivos').createSignedUrl(path, 60*60*24*365); // 1 year
  _fotoPath = path;
  _fotoFile = null;
  return data?.signedUrl || null;
}

function attachPedidoEvents(){setTimeout(()=>{renderLineas();document.querySelectorAll('[name="costePostprocesado"],[name="gananciaManual"]').forEach(el=>el.addEventListener('input',refreshCostPreview));},60);}

function editO(id){
  const x=id?_cache.pedidos.find(o=>o.id===id)||{}:{};
  // Init foto state
  _fotoFile = null;
  _fotoUrl  = x.fotoUrl || null;
  _fotoPath = x.fotoPath || null;
  openModal(msh(id?'Editar pedido':'Nuevo pedido',`${pedidoFrm(x)}<div style="display:flex;gap:10px;margin-top:16px"><button class="btn-primary" id="save-o-btn" onclick="saveO('${id||''}')">💾 Guardar pedido</button><button class="btn-secondary" onclick="closeModal()">Cancelar</button></div>`),true);
  attachPedidoEvents();
}

async function saveO(id){
  const d=gfd(['clienteId','proyecto','estado','notas','fecha','gananciaManual','costePostprocesado']);
  if(!d.proyecto.trim()){alert('Proyecto obligatorio');return;}
  if(_lineas.length===0){alert('Añade al menos una pieza');return;}
  setLoading('save-o-btn',true);

  const {pesoTotal,tiempoTotal}=calcLineasTotals(_lineas);
  const firstLinea=_lineas[0]||{};
  const mainMat=firstLinea.material||'PLA';
  const mainFilId=firstLinea.filamentoId&&firstLinea.filamentoId!=='__manual__'?firstLinea.filamentoId:null;

  const prevOrder=_cache.pedidos.find(o=>o.id===id);
  let presNum=prevOrder?.presNum||'';
  if(!id) presNum=await nextPresNum();

  const rowId = id || uid();
  // Upload foto if selected
  const fotoUrl = await uploadFotoIfNeeded(rowId);

  // Descontar filamento del stock — SOLO en pedidos nuevos (no al editar)
  // Editar un pedido no cambia el stock para evitar dobles descuentos
  if(!id && pesoTotal > 0){
    if(mainFilId){
      const f=_cache.filamentos.find(x=>x.id===mainFilId);
      if(f){
        const nv=Math.max(0, parseFloat(f.pesoRestante)-pesoTotal);
        await dbSave('filamentos',{id:f.id, peso_restante:nv});
        _cache.filamentos=_cache.filamentos.map(x=>x.id===f.id?{...x,pesoRestante:nv}:x);
      }
    } else if(mainMat){
      const f=_cache.filamentos.find(x=>x.tipo===mainMat);
      if(f){
        const nv=Math.max(0, parseFloat(f.pesoRestante)-pesoTotal);
        await dbSave('filamentos',{id:f.id, peso_restante:nv});
        _cache.filamentos=_cache.filamentos.map(x=>x.id===f.id?{...x,pesoRestante:nv}:x);
      }
    }
  }

  const row={
    proyecto:d.proyecto,
    cliente_id:d.clienteId||null,
    material:mainMat,
    peso:pesoTotal||null,
    tiempo_impresion:tiempoTotal||null,
    estado:d.estado,
    notas:d.notas||null,
    fecha:d.fecha||null,
    ganancia_manual:d.gananciaManual||null,
    coste_postprocesado:d.costePostprocesado||0,
    pres_num:presNum,
    lineas:_lineas,
    factura_num:prevOrder?.facturaNum||null,
    factura_fecha:prevOrder?.facturaFecha||null,
    foto_url:fotoUrl||null,
    foto_path:_fotoPath||null,
  };
  row.id = rowId;
  const ok=await dbSave('pedidos',row);
  if(ok){
    const mapped={id:row.id,clienteId:d.clienteId,proyecto:d.proyecto,material:mainMat,peso:pesoTotal,tiempoImpresion:tiempoTotal,estado:d.estado,notas:d.notas,fecha:d.fecha,gananciaManual:d.gananciaManual,costePostprocesado:d.costePostprocesado,presNum:presNum,facturaNum:prevOrder?.facturaNum||null,facturaFecha:prevOrder?.facturaFecha||null,lineas:_lineas,fotoUrl:fotoUrl||null,fotoPath:_fotoPath||null};
    if(id)_cache.pedidos=_cache.pedidos.map(o=>o.id===id?mapped:o);else _cache.pedidos.push(mapped);
    closeModal();render();refreshAlerts();showToast('✅ Pedido guardado','ok');
  }
}

function delO(id){ confirmDel('¿Eliminar este pedido?',`doDelO('${id}')`); }
async function doDelO(id){ if(await dbDel('pedidos',id)){_cache.pedidos=_cache.pedidos.filter(x=>x.id!==id);render();showToast('Eliminado','ok');} }

function pgArchivos(){
  const files=_cache.archivos;
  const cards=files.length===0?'<p style="color:#3d5a7a">Sin archivos</p>':files.map(f=>`
<div class="card" style="width:170px;padding:14px">
<div class="file-thumb" ${f.is_image?`onclick="prevFile('${f.id}')" style="cursor:pointer"`:''}>${f.is_image&&f._url?`<img src="${f._url}" alt="${esc(f.name)}">`:`<span style="font-size:40px">${f.is_stl?'🔷':'📄'}</span>`}</div>
<div style="font-size:11px;color:#7a9ab8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;font-weight:500">${esc(f.name)}</div>
<div style="font-size:10px;color:#3d5a7a;margin-bottom:10px">${((f.size||0)/1024).toFixed(1)} KB · ${esc(f.fecha)}</div>
<div style="display:flex;gap:6px"><button class="btn-secondary" style="padding:5px 10px;font-size:12px" onclick="dlFile('${f.id}')">⬇️</button><button class="btn-icon" onclick="delFile('${f.id}')">🗑️</button></div>
</div>`).join('');
  return`<h2 class="page-title" style="margin-bottom:4px">Archivos</h2>
<p style="color:#3d5a7a;font-size:13px;margin-bottom:16px">STL e imágenes — guardados en Supabase Storage (máx. 50MB).</p>
<div class="dropzone" id="dz" onclick="$('fi').click()">
<input type="file" id="fi" multiple accept=".stl,image/*" style="display:none" onchange="procFiles(this.files)">
<div style="font-size:44px;margin-bottom:10px">📁</div>
<div style="color:#7a9ab8;font-size:14px;font-weight:500">Arrastra archivos o haz clic</div>
<div style="color:#3d5a7a;font-size:12px;margin-top:6px">STL, JPG, PNG, WebP, GIF</div>
</div>
<div class="flexwrap">${cards}</div>`;
}

function initDZ(){
  const dz=$('dz');if(!dz)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');procFiles(e.dataTransfer.files);});
}

async function procFiles(fl){
  for(const f of Array.from(fl)){
    if(f.size>50*1024*1024){showToast(f.name+' supera 50MB','err');continue;}
    showToast('Subiendo '+f.name+'…','ok',8000);
    const path=`${CU.id}/${Date.now()}_${f.name}`;
    const {error:upErr}=await sb.storage.from('archivos').upload(path,f);
    if(upErr){showToast('Error subiendo: '+upErr.message,'err');continue;}
    const isImage=f.type.startsWith('image/');
    const isSTL=f.name.toLowerCase().endsWith('.stl');
    const row={id:uid(),name:f.name,size:f.size,type:f.type,is_image:isImage,is_stl:isSTL,storage_path:path,fecha:today()};
    const {error:dbErr}=await sb.from('archivos').insert({...row,user_id:CU.id});
    if(dbErr){showToast('Error registrando: '+dbErr.message,'err');continue;}
    // Get signed URL for images
    let _url=null;
    if(isImage){const {data}=await sb.storage.from('archivos').createSignedUrl(path,3600);_url=data?.signedUrl||null;}
    _cache.archivos.push({...row,_url});
    showToast(f.name+' subido ✓','ok');
    render();
  }
}

async function dlFile(id){
  const f=_cache.archivos.find(x=>x.id===id);if(!f)return;
  const {data,error}=await sb.storage.from('archivos').createSignedUrl(f.storage_path,60);
  if(error){showToast('Error al descargar','err');return;}
  const a=document.createElement('a');a.href=data.signedUrl;a.download=f.name;a.click();
}

async function delFile(id){
  const f=_cache.archivos.find(x=>x.id===id);if(!f)return;
  await sb.storage.from('archivos').remove([f.storage_path]);
  await dbDel('archivos',id);
  _cache.archivos=_cache.archivos.filter(x=>x.id!==id);
  render();showToast('Eliminado','ok');
}

async function prevFile(id){
  const f=_cache.archivos.find(x=>x.id===id);if(!f)return;
  let url=f._url;
  if(!url){const {data}=await sb.storage.from('archivos').createSignedUrl(f.storage_path,3600);url=data?.signedUrl;}
  if(!url){showToast('No se pudo obtener la imagen','err');return;}
  openModal(msh(f.name,`<img src="${url}" alt="${esc(f.name)}" style="max-width:100%;border-radius:8px">`),true);
}

async function saveConfig(){
  const d=gfd(['costePorGramo','costePorHora','margen','moneda']);
  const row={user_id:CU.id,coste_por_gramo:d.costePorGramo,coste_por_hora:d.costePorHora,margen:d.margen,moneda:d.moneda,empresa:_cache.cfg.empresa||'',telefono:_cache.cfg.telefono||'',email:_cache.cfg.email||''};
  const {error}=await sb.from('config').upsert(row,{onConflict:'user_id'});
  if(error){showToast('Error: '+error.message,'err');return;}
  _cache.cfg={..._cache.cfg,...mapCfg(row)};
  const b=$('scb');if(b){b.textContent='✅ Guardado';setTimeout(()=>{b.textContent='Guardar configuración';},2000);}
  showToast('Configuración guardada','ok');
}

async function saveBiz(){

}
