<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Glow Filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background/Structure lines (isometric grid feel) -->
  <g opacity="0.1" stroke="#94A3B8" stroke-width="0.5" fill="none">
    <line x1="10" y1="20" x2="90" y2="20" />
    <line x1="10" y1="50" x2="90" y2="50" />
    <line x1="10" y1="80" x2="90" y2="80" />
    <line x1="20" y1="10" x2="20" y2="90" />
    <line x1="50" y1="10" x2="50" y2="90" />
    <line x1="80" y1="10" x2="80" y2="90" />
    <path d="M 20,50 L 50,20 L 80,50 L 50,80 Z" />
  </g>
  <!-- Layer 1 (Base/Shadow layer) -->
  <path d="M 30,15 L 30,85 M 30,15 C 65,15 65,48 30,48 C 70,48 70,85 30,85" 
        fill="none" stroke="rgba(0, 140, 255, 0.15)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" transform="translate(3, 3)" />
  <!-- Layer 2 (Mid layer) -->
  <path d="M 30,15 L 30,85 M 30,15 C 65,15 65,48 30,48 C 70,48 70,85 30,85" 
        fill="none" stroke="rgba(0, 140, 255, 0.45)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" transform="translate(1.5, 1.5)" />
  <!-- Layer 3 (Top/Active extrusion layer with glow) -->
  <path d="M 30,15 L 30,85 M 30,15 C 65,15 65,48 30,48 C 70,48 70,85 30,85" 
        fill="none" stroke="#008CFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Print nozzle tip accent (active printing dot) -->
  <circle cx="30" cy="48" r="4" fill="#F8FAFC" filter="url(#glow)" />
  <circle cx="30" cy="48" r="2" fill="#008CFF" />
</svg>
